<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IT ASSETS</title>
<link rel="stylesheet" href="/css/main.css">
<script src="/js/event-delegation.js"></script>
<script src="/js/ui-utils.js"></script>
<script src="/js/qr.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/meta-fields.js"></script>
<script src="/js/global-search.js"></script>
<script src="/js/router.js"></script>
<script src="/js/settings-router.js"></script>
<script src="/js/views/settings-general.js"></script>
<script src="/js/views/settings-refdata.js"></script>
<script src="/js/views/settings-config.js"></script>
<script src="/js/views/dashboard.js"></script>
<script src="/js/views/alerts.js"></script>
<script src="/js/views/accounts.js"></script>
<script src="/js/views/asset-tab.js"></script>
<script src="/js/views/history.js"></script>
<script src="/js/views/asset-forms.js"></script>
<script src="/js/views/inv-generator.js"></script>
<script src="/js/views/qr-print.js"></script>
<script src="/js/views/employees.js"></script>
<script src="/js/views/users-admin.js"></script>
<script src="/js/views/types-admin.js"></script>
<script src="/js/error-handler.js"></script>
</head>
<body>
<div id="header">
  <div id="company-logo-wrap" style="display:flex;align-items:center;gap:10px;cursor:pointer" data-action="switchTab" data-args='["dashboard"]' title="Перейти на дашборд">
    <div id="company-logo-svg" style="display:none;height:36px"></div>
    <div id="company-logo-emoji" style="font-size:24px">🖥️</div>
    <div><div class="logo" id="company-logo">IT<span>ASSETS</span></div><div style="font-size:11px;opacity:.6;margin-top:1px">Управление ИТ-оборудованием <span style="font-size:10px;opacity:.5;font-weight:400"><span id="app-version">…</span></span></div></div>
  </div>
  <div class="hml">
    <button id="theme-toggle" data-action="toggleTheme" title="Переключить тему"
      style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:15px">🌙</button>
    <button id="lang-toggle" data-action="toggleLang" title="Switch language / Переключить язык"
      style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.5px">EN</button>
    <span id="total-badge" class="hbadge">...</span>
    <span id="auth-status" style="font-size:12px;opacity:.8">👁 Просмотр</span>
    <button class="auth-btn" id="auth-btn" data-action="toggleAuth">🔐 Войти</button>
  </div>
</div>
<div id="nav">
  <button class="nav-btn active" data-tab="dashboard" data-action="switchTab" data-args='["dashboard"]'>📊 Дашборд</button>
  <button class="nav-btn nav-auth" data-tab="os"       data-action="switchTab" data-args='["os"]'>💻 ОС</button>
  <button class="nav-btn nav-auth" data-tab="small"    data-action="switchTab" data-args='["small"]'>🖱 Мелочи</button>
  <button class="nav-btn nav-auth" data-tab="infra"    data-action="switchTab" data-args='["infra"]'>🌐 Инфра</button>
  <button class="nav-btn nav-auth" data-tab="history"  data-action="switchTab" data-args='["history"]'>🔄 История</button>
  <button class="nav-btn nav-auth" data-tab="accounts" data-action="switchTab" data-args='["accounts"]'>🔑 Учётки</button>
  <button class="nav-btn nav-auth" data-tab="alerts"   data-action="switchTab" data-args='["alerts"]'>⚠️ Внимание</button>
  <button class="nav-btn nav-auth" data-tab="settings" data-action="switchTab" data-args='["settings"]'>⚙️ Настройки</button>
</div>
<div id="app"><div class="spinner"></div></div>
<div id="modal-overlay" data-action-self="closeModal"><div class="modal" id="modal-box"></div></div>
<div id="toast"></div>

<script src="/js/core-state.js"></script>
<script src="/js/views/settings-backup.js"></script>
<script src="/js/views/csv-import.js"></script>
<!-- bootstrap.js ДОЛЖЕН БЫТЬ ПОСЛЕДНИМ — render() внизу требует, чтобы все
     остальные функции (renderDashboard/renderHistory/... и т.д.) уже были
     определены предыдущими скриптами. -->
<script src="/js/bootstrap.js"></script>

<div id="print-frame"></div>
</body>
</html>
