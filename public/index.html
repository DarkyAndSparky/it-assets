// ─── INV NUMBER GENERATOR ────────────────────────────────────────────────────
function openInvGenerator(targetId, orgSelectId, typeSelectId) {
  const orgs  = invCodes.orgs  || {};
  const types = invCodes.types || {};

  // ── Автоподбор из контекстной формы ──────────────────────────────────────
  // Орг: из select по имени орг → ищем short_code
  let preselectedOrg  = '';
  let preselectedType = '';

  if (orgSelectId) {
    const orgEl = document.getElementById(orgSelectId);
    const orgName = orgEl?.value?.trim() || '';
    if (orgName) {
      // orgs = { YRK: 'ЯРКО', LDV: 'Лето ДВЛ', ... }
      const match = Object.entries(orgs).find(([code, name]) =>
        name === orgName || code === orgName.toUpperCase()
      );
      if (match) preselectedOrg = match[0];
    }
  }

  if (typeSelectId) {
    const typeEl = document.getElementById(typeSelectId);
    const typeName = typeEl?.value?.trim() || '';
    if (typeName) {
      // types = { NB: 'Ноутбук', MON: 'Монитор', ... }
      const match = Object.entries(types).find(([code, name]) =>
        name === typeName || code === typeName.toUpperCase()
      );
      if (match) preselectedType = match[0];
      // Если не нашли — покажем подсказку: нет правила для этого типа у орг
    }
  }

  const orgOpts = Object.entries(orgs)
    .map(([k,v])=>`<option value="${k}" ${k===preselectedOrg?'selected':''}>${k} — ${v}</option>`)
    .join('');
  const typeOpts = Object.entries(types)
    .map(([k,v])=>`<option value="${k}" ${k===preselectedType?'selected':''}>${k} — ${v}</option>`)
    .join('');

  const hasPreset = preselectedOrg && preselectedType;

  showModal(`
    <h2>🏷 Генератор инвентарного номера</h2>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">
      Формат: <b>[ORG]-[TYPE]-XXXXX</b> · Порядковый номер присваивается автоматически
    </div>
    ${hasPreset ? `<div style="background:var(--success-bg);border:1px solid var(--success-border);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;color:var(--success-text)">
      ✅ Подобрано из формы: <b>${preselectedOrg}</b> · <b>${preselectedType}</b>
    </div>` : (preselectedOrg && !preselectedType) ? `<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;color:var(--warn-text)">
      ⚠️ Для типа «${document.getElementById(typeSelectId)?.value||'?'}» нет правила инв. номера у этой организации. Выберите тип вручную.
      <button class="btn btn-primary btn-sm" style="margin-top:8px"
        onclick="createInvRuleFromGenerator('${preselectedOrg}','${document.getElementById(typeSelectId)?.value||''}')">
        + Создать правило для этого типа
      </button>
    </div>` : ''}
    <div class="two-col">
      <div class="form-row"><label>Организация</label>
        <select id="ig-org" onchange="refreshInvPreview()">${orgOpts}</select>
      </div>
      <div class="form-row"><label>Тип устройства</label>
        <select id="ig-type" onchange="refreshInvPreview()">${typeOpts}</select>
      </div>
    </div>
    <div class="form-row">
      <label>Предпросмотр</label>
      <div style="display:flex;gap:7px;align-items:center">
        <input id="ig-preview" style="flex:1;font-weight:700;font-size:14px;font-family:monospace;background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe" readonly/>
        <button class="btn btn-secondary btn-sm" onclick="refreshInvPreview()">🔄 Обновить</button>
      </div>
    </div>
    <div id="ig-note" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="applyInvNumber('${targetId}')">Применить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>
  `);
  refreshInvPreview();
}

async function refreshInvPreview() {
  const org  = document.getElementById('ig-org')?.value;
  const type = document.getElementById('ig-type')?.value;
  if (!org || !type) return;
  const el   = document.getElementById('ig-preview');
  const note = document.getElementById('ig-note');
  try {
    const r = await fetch(`${API}/api/inv/next?org=${org}&type=${type}`);
    const d = await r.json();
    if (r.ok && d.inv) {
      if (el) { el.value = d.inv; el.style.background='#eff6ff'; el.style.color='#1d4ed8'; }
      if (note) note.innerHTML = `Следующий свободный номер для <b>${org}-${type}</b>`;
      // Скрываем кнопку создания если была
      const cb = document.getElementById('ig-create-rule-btn');
      if (cb) cb.style.display = 'none';
    } else {
      // Нет правила для этой пары орг+тип
      if (el) { el.value = ''; el.style.background='var(--warn-bg)'; el.style.color='var(--warn-text)'; }
      if (note) note.innerHTML = `
        <span style="color:var(--warn-text)">⚠️ Нет правила инв. номера для <b>${org}-${type}</b></span>
        <button id="ig-create-rule-btn" class="btn btn-primary btn-sm" style="margin-left:8px"
          onclick="createInvRuleFromGenerator('${org}','')">
          + Создать правило
        </button>`;
    }
  } catch(e) {
    if (note) note.textContent = 'Ошибка: ' + e.message;
  }
}

async function applyInvNumber(targetId) {
  const inv  = document.getElementById('ig-preview')?.value;
  const org  = document.getElementById('ig-org')?.value;
  const type = document.getElementById('ig-type')?.value;
  if (!inv) return;
  // Reserve the number
  await fetch(`${API}/api/inv/reserve`,{method:'POST',headers:ah(),body:JSON.stringify({org,type})}).catch(()=>{});
  closeModal();
  // We need to re-open the parent modal... instead just set value on existing field
  setTimeout(()=>{
    const el = document.getElementById(targetId);
    if (el) { el.value = inv; el.style.background='#eff6ff'; el.style.color='#1d4ed8'; }
  }, 100);
}


async function createInvRuleFromGenerator(orgCode, typeName) {
  // Находим org_id по short_code
  const orgs = await fetch(`${API}/api/orgs`).then(r=>r.json()).catch(()=>[]);
  const org = orgs.find(o => o.short_code === orgCode);
  if (!org) return toast('Организация не найдена: ' + orgCode, 'error');

  // Автозаполняем type_code из имени если возможно
  const typeCodes = await fetch(`${API}/api/type-codes`).then(r=>r.json()).catch(()=>[]);
  const matchedCode = typeCodes.find(t => t.name === typeName);
  const autoCode = matchedCode ? matchedCode.code : '';
  const autoName = typeName || '';

  // Показываем inline-форму поверх текущего модала
  const note = document.getElementById('ig-note');
  if (!note) return;
  note.innerHTML = `
    <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;color:#0369a1;margin-bottom:8px">
        + Новое правило инв. номеров для <b>${orgCode}</b>
      </div>
      <div class="two-col" style="gap:8px">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Код типа *</div>
          <input id="igcr-code" value="${autoCode}" placeholder="NB" maxlength="6"
            style="width:100%;font-size:13px" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Название *</div>
          <input id="igcr-name" value="${autoName}" placeholder="Ноутбук" style="width:100%;font-size:13px"/>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;margin-bottom:8px">
        Инв. номер будет: <code>${orgCode}-[КОД]-00001</code>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="submitInvRuleFromGenerator('${org.id}','${orgCode}')">✓ Создать и применить</button>
        <button class="btn btn-secondary btn-sm" onclick="refreshInvPreview()">Отмена</button>
      </div>
    </div>`;
}

async function submitInvRuleFromGenerator(orgId, orgCode) {
  const type_code = document.getElementById('igcr-code')?.value.trim().toUpperCase();
  const type_name = document.getElementById('igcr-name')?.value.trim();
  if (!type_code || !type_name) return toast('Заполните код и название', 'error');

  const r = await fetch(`${API}/api/orgs/${orgId}/inv-rules`, {
    method: 'POST', headers: ah(),
    body: JSON.stringify({ type_code, type_name })
  });
  const d = await r.json();
  if (!r.ok) return toast(d.error || 'Ошибка создания правила', 'error');

  toast(`Правило ${orgCode}-${type_code} создано`, 'success');

  // Обновляем список типов в селекте генератора
  const typeEl = document.getElementById('ig-type');
  if (typeEl) {
    // Добавляем новый option и выбираем его
    const opt = document.createElement('option');
    opt.value = type_code;
    opt.textContent = `${type_code} — ${type_name}`;
    opt.selected = true;
    typeEl.appendChild(opt);
  }

  // Обновляем глобальный кэш орг
  _orgsCache = await fetch(`${API}/api/orgs`).then(r=>r.json()).catch(()=>_orgsCache);

  // Перезапрашиваем номер
  await refreshInvPreview();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function sc(s){return s==='используется'?'s-used':s==='резерв'?'s-reserve':'s-off';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){if(!d)return'—';try{return d.slice(0,10).split('-').reverse().join('.');}catch{return d;}}

function copyToClipboard(text, successMsg='Скопировано') {
  if (!text) return;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => toast(successMsg, 'success'))
      .catch(() => _copyFallback(text, successMsg));
  } else {
    _copyFallback(text, successMsg);
  }
}
function _copyFallback(text, successMsg) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); toast(successMsg, 'success'); }
  catch(e) { toast('Не удалось скопировать', 'error'); }
  document.body.removeChild(el);
}
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function toast(msg,type=''){
  const el=document.createElement('div');el.className='toast-msg '+type;el.textContent=msg;
  document.getElementById('toast').appendChild(el);setTimeout(()=>el.remove(),3000);}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&(document.getElementById('m-pwd')||document.getElementById('m-login'))&&document.getElementById('modal-overlay').classList.contains('open'))doLogin();
});

// Global error safety net
window.addEventListener('unhandledrejection', e => {
  console.error('Unhandled promise rejection:', e.reason);
  const app = document.getElementById('app');
  if (app && app.innerHTML.includes('spinner')) {
    app.innerHTML = `<div class="card" style="max-width:500px">
      <div style="color:var(--danger-text);font-weight:700;margin-bottom:8px">❌ Ошибка загрузки</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${String(e.reason)}</div>
      <div style="font-size:12px;color:var(--muted)">Проверьте консоль браузера (F12) для деталей.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="render()">🔄 Попробовать снова</button>
    </div>`;
  }
});

_initThemeBtn();
_updateAuthUI();
render();

// ─── ПЕЧАТЬ КАРТОЧКИ ─────────────────────────────────────────────────────────

function buildQrText(a) {
  // Только латиница/цифры где возможно — меньше байт, плотнее QR
  let lines = [];
  if (a.inv)    lines.push('INV:' + a.inv);
  if (a.serial) lines.push('SN:' + a.serial);
  if (a.model)  lines.push(a.model);
  return lines.join('\n');
}

function renderQrInto(containerId, text) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  // Используем серверный /api/qr напрямую — надёжнее шима
  const url = `${API}/api/qr?text=` + encodeURIComponent(text);
  const img = document.createElement('img');
  img.src    = url;
  img.width  = 200;
  img.height = 200;
  img.style.cssText = 'display:block;image-rendering:pixelated';
  img.alt    = 'QR';
  img.onerror = () => { el.textContent = 'QR недоступен'; };
  el.appendChild(img);
}

function printAsset(assetData) {
  const a = assetData;
  const qrText = buildQrText(a);

  // Заполняем print-frame
  const frame = document.getElementById('print-frame');
  frame.innerHTML = `
    <div class="pf-title">${esc(a.model || '—')}</div>
    <div class="pf-type">${esc(a.type || '')}${a.category ? ' · ' + esc(a.category) : ''}</div>
    ${a.serial ? `<div class="pf-row"><div class="pf-label">Серийный номер</div><div class="pf-val">${esc(a.serial)}</div></div>` : ''}
    ${a.inv    ? `<div class="pf-row"><div class="pf-label">Инвентарный номер</div><div class="pf-val">${esc(a.inv)}</div></div>` : ''}
    <div class="pf-qr">
      <div id="pf-qr-canvas"></div>
      <div class="pf-hint">${esc(qrText.replace(/\n/g,' · '))}</div>
    </div>`;

  // QR через серверный /api/qr — ждём onload перед печатью
  const qrEl = document.getElementById('pf-qr-canvas');
  if (qrEl) {
    const img = document.createElement('img');
    img.width  = 280;
    img.height = 280;
    img.style.cssText = 'display:block;image-rendering:pixelated';
    img.src = `${API}/api/qr?text=` + encodeURIComponent(qrText);
    img.onload  = () => setTimeout(() => window.print(), 100);
    img.onerror = () => window.print(); // печатаем даже без QR
    qrEl.appendChild(img);
  } else {
    window.print();
  }
}

</script>

<div id="print-frame"></div>

<script>
// ─── СОТРУДНИКИ ───────────────────────────────────────────────────────────────

// ─── Employees state ─────────────────────────────────────────────────────────
let _empData = [];         // все сотрудники (кэш)
let _empPage = { active: 1, inactive: 1 };
const EMP_PAGE_SIZE = 50;

function _empFilter() {
  const q = (document.getElementById('emp-search-input')?.value || '').trim().toLowerCase();
  const showAll = document.getElementById('emp-show-all')?.checked || false;
  return { q, showAll };
}

function _empFilterList(list, q) {
  if (!q) return list;
  return list.filter(e =>
    e.name.toLowerCase().includes(q) ||
    (e.dept   && e.dept.toLowerCase().includes(q)) ||
    (e.filial  && e.filial.toLowerCase().includes(q)) ||
    (e.phone   && e.phone.includes(q))
  );
}

function _empRenderRows(list) {
  if (!list.length) return '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Нет записей</td></tr>';
  return list.map(e => `
    <tr class="clickable" onclick="showEmployeeDetail('${e.id}')"${e.active===false?' style="opacity:.6"':''}>
      <td style="font-weight:600">${esc(e.name)}</td>
      <td style="color:var(--muted)">${esc(e.dept||'—')}</td>
      <td style="color:var(--muted)">${esc(e.filial||'—')}</td>
      <td style="color:var(--muted)">${esc(e.phone||'—')}</td>
      <td><span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;
          background:${e.active!==false?'var(--success-bg)':'var(--surface2)'};
          color:${e.active!==false?'var(--success-text)':'var(--muted)'}">${e.active!==false?'активен':'уволен'}</span></td>
      <td style="white-space:nowrap" onclick="event.stopPropagation()">
        ${e.active!==false
          ? `<button class="btn-icon" onclick="showEditEmployeeModal('${e.id}')">✏️</button>
             <button class="btn-icon" onclick="deleteEmployee('${e.id}','${esc(e.name)}')">🗑</button>`
          : `<button class="btn-icon" onclick="showEditEmployeeModal('${e.id}')" title="Просмотр">👁️</button>`}
      </td>
    </tr>`).join('');
}

// Только обновляет таблицы без пересоздания инпута — фокус не теряется
function _empRefreshTables() {
  const { q, showAll } = _empFilter();
  const active   = _empData.filter(e => e.active !== false);
  const inactive = _empData.filter(e => e.active === false);
  const fActive   = _empFilterList(active, q);
  const fInactive = _empFilterList(inactive, q);

  // Обновляем счётчики
  const hA = document.getElementById('emp-head-active');
  const hI = document.getElementById('emp-head-inactive');
  if (hA) hA.textContent = `✅ Активные (${fActive.length})`;
  if (hI) hI.textContent = `❌ Уволены (${fInactive.length})`;

  // Обновляем блоки
  _empRenderSection('active',   fActive,   showAll);
  _empRenderSection('inactive', fInactive, showAll);

  // Пустой результат
  const empty = document.getElementById('emp-empty');
  if (empty) empty.style.display = (fActive.length === 0 && fInactive.length === 0) ? '' : 'none';

  // Обновить счётчик в заголовке карточки
  const total = document.getElementById('emp-total');
  if (total) total.textContent = `Сотрудники (${_empData.length})`;
}

function _empRenderSection(key, list, showAll) {
  const wrap = document.getElementById(`emp-section-${key}`);
  if (!wrap) return;

  const pageSize  = showAll ? list.length || 1 : EMP_PAGE_SIZE;
  const pageCount = Math.max(1, Math.ceil(list.length / pageSize));
  // Зажимаем текущую страницу
  if (_empPage[key] > pageCount) _empPage[key] = pageCount;
  const page = _empPage[key];
  const slice = list.slice((page - 1) * pageSize, page * pageSize);

  // tbody
  const tbody = wrap.querySelector('tbody');
  if (tbody) tbody.innerHTML = _empRenderRows(slice);

  // пагинатор
  const pager = wrap.querySelector('.emp-pager');
  if (pager) {
    pager.style.display = (pageCount > 1) ? 'flex' : 'none';
    const info = pager.querySelector('.emp-page-info');
    if (info) info.textContent = `Страница ${page}/${pageCount}`;
    pager.querySelector('.emp-prev2')?.toggleAttribute('disabled', page <= 1);
    pager.querySelector('.emp-prev') ?.toggleAttribute('disabled', page <= 1);
    pager.querySelector('.emp-next') ?.toggleAttribute('disabled', page >= pageCount);
    pager.querySelector('.emp-next2')?.toggleAttribute('disabled', page >= pageCount);
  }

  // "показать все"
  const showAllWrap = wrap.querySelector('.emp-show-all-wrap');
  if (showAllWrap) showAllWrap.style.display = (list.length > EMP_PAGE_SIZE) ? '' : 'none';

  // секция видима только если есть данные
  wrap.style.display = list.length === 0 ? 'none' : '';
}

function _empChangePage(key, delta) {
  _empPage[key] = Math.max(1, (_empPage[key] || 1) + delta);
  _empRefreshTables();
}

async function _renderEmployeesPanel() {
  try { _empData = await fetch(`${API}/api/employees`, {headers:ah()}).then(r=>r.json()); }
  catch(e) { _empData = []; }

  _empPage = { active: 1, inactive: 1 };

  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="section-title" style="margin:0" id="emp-total">Сотрудники (${_empData.length})</div>
      <button class="btn btn-primary btn-sm" onclick="showCreateEmployeeModal()">+ Добавить</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Используется для автодополнения поля «Ответственный» при добавлении и перемещении оборудования.
    </div>

    <div style="margin-bottom:15px">
      <input type="text" id="emp-search-input"
        placeholder="🔍 Поиск по ФИО, отделу, филиалу, телефону..."
        style="width:100%;padding:8px 12px;border:1px solid var(--surface2);border-radius:6px;background:var(--surface1);color:var(--text);font-size:13px"
        oninput="_empRefreshTables()">
    </div>

    ${_empSectionHtml('active',   '✅ Активные')}
    ${_empSectionHtml('inactive', '❌ Уволены')}

    <div id="emp-empty" style="display:none;color:var(--muted);text-align:center;padding:20px">Ничего не найдено</div>
  </div>`;
}

function _empSectionHtml(key, label) {
  return `
  <div id="emp-section-${key}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin:15px 0 8px">
      <h3 id="emp-head-${key}" style="margin:0;font-size:14px">${label}</h3>
      <div class="emp-show-all-wrap" style="display:none">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="emp-show-all" onchange="_empRefreshTables()">
          Показать все
        </label>
      </div>
    </div>
    <div class="emp-pager" style="display:none;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
      <button class="btn btn-sm emp-prev2" onclick="_empChangePage('${key}',-9999)">⏮</button>
      <button class="btn btn-sm emp-prev"  onclick="_empChangePage('${key}',-1)">◀</button>
      <span class="emp-page-info" style="font-size:12px;min-width:90px;text-align:center">Страница 1/1</span>
      <button class="btn btn-sm emp-next"  onclick="_empChangePage('${key}',1)">▶</button>
      <button class="btn btn-sm emp-next2" onclick="_empChangePage('${key}',9999)">⏭</button>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>ФИО</th><th>Отдел</th><th>Филиал</th><th>Телефон</th><th>Статус</th><th></th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>`;
}

function showCreateEmployeeModal() {
  showModal(`<h2>🧑‍💼 Новый сотрудник</h2>
    <div class="form-row"><label>ФИО *</label><input id="em-name" placeholder="Иванов Иван Иванович" autofocus/></div>
    <div class="form-row"><label>Отдел</label><input id="em-dept" placeholder="Отдел ИТ"/></div>
    <div class="form-row"><label>Филиал</label><input id="em-filial" placeholder="Малышева"/></div>
    <div class="form-row"><label>Телефон</label><input id="em-phone" placeholder="+7 900 000-00-00"/></div>
    <div class="form-row"><label>Email</label><input id="em-email" type="email" placeholder="ivanov@company.ru"/></div>
    <div class="form-row"><label>Примечание</label><input id="em-note" placeholder=""/></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doCreateEmployee()">Создать</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
}

async function doCreateEmployee() {
  const f = id => document.getElementById(id)?.value.trim() || '';
  if (!f('em-name')) return toast('Введите ФИО','error');
  const r = await fetch(`${API}/api/employees`, {method:'POST', headers:ah(),
    body:JSON.stringify({name:f('em-name'),dept:f('em-dept'),filial:f('em-filial'),
      phone:f('em-phone'),email:f('em-email'),note:f('em-note')})});
  const d = await r.json();
  if (r.ok) { closeModal(); toast('Сотрудник добавлен','success'); _reloadEmployeesPanel(); }
  else toast(d.error||'Ошибка','error');
}

async function showEditEmployeeModal(id) {
  let emp;
  try { emp = await fetch(`${API}/api/employees/${id}`,{headers:ah()}).then(r=>r.json()); }
  catch(e) { return toast('Ошибка загрузки','error'); }
  showModal(`<h2>✏️ Редактировать сотрудника</h2>
    <div class="form-row"><label>ФИО *</label><input id="em-name" value="${esc(emp.name||'')}"/></div>
    <div class="form-row"><label>Отдел</label><input id="em-dept" value="${esc(emp.dept||'')}"/></div>
    <div class="form-row"><label>Филиал</label><input id="em-filial" value="${esc(emp.filial||'')}"/></div>
    <div class="form-row"><label>Телефон</label><input id="em-phone" value="${esc(emp.phone||'')}"/></div>
    <div class="form-row"><label>Email</label><input id="em-email" value="${esc(emp.email||'')}"/></div>
    <div class="form-row"><label>Примечание</label><input id="em-note" value="${esc(emp.note||'')}"/></div>
    <div class="form-row"><label>Статус</label>
      <select id="em-active">
        <option value="true"  ${emp.active!==false?'selected':''}>Активен</option>
        <option value="false" ${emp.active===false?'selected':''}>Уволен</option>
      </select></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doUpdateEmployee('${id}')">Сохранить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
}

async function doUpdateEmployee(id) {
  const f = i => document.getElementById(i)?.value.trim() || '';
  if (!f('em-name')) return toast('Введите ФИО','error');
  const active = document.getElementById('em-active')?.value === 'true';
  const r = await fetch(`${API}/api/employees/${id}`, {method:'PUT', headers:ah(),
    body:JSON.stringify({name:f('em-name'),dept:f('em-dept'),filial:f('em-filial'),
      phone:f('em-phone'),email:f('em-email'),note:f('em-note'),active})});
  const d = await r.json();
  if (r.ok) { closeModal(); toast('Сохранено','success'); _reloadEmployeesPanel(); }
  else toast(d.error||'Ошибка','error');
}

async function deleteEmployee(id, name) {
  if (!confirm(`Уволить сотрудника «${name}»?`)) return;
  const r = await fetch(`${API}/api/employees/${id}`, {method:'DELETE', headers:ah()});
  const d = await r.json();
  if (r.ok) {
    // Если есть оборудование — показываем модальное окно
    if (d.linked_assets && d.linked_assets > 0) {
      showReassignAssetsModal(id, name, d.assets || []);
    } else {
      toast('Сотрудник деактивирован','success');
      _reloadEmployeesPanel();
    }
  } else {
    toast(d.error||'Ошибка при удалении','error');
  }
}

async function reassignEmployeeAssets(fromEmpId, toEmpId) {
  const payload = toEmpId ? { to_employee_id: toEmpId } : {};
  const r = await fetch(`${API}/api/employees/${fromEmpId}/reassign-assets`, {
    method:'POST',
    headers:{...ah(),'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const d = await r.json();
  if (r.ok) {
    closeModal();
    if (toEmpId) {
      toast(`Оборудование перемещено: ${d.moved} единиц`, 'success');
    } else {
      toast(`Оборудование оставлено без ответственного: ${d.left_unassigned} единиц`, 'success');
    }
    _reloadEmployeesPanel();
  } else {
    toast(d.error || 'Ошибка при перемещении', 'error');
  }
}

async function _reloadEmployeesPanel() {
  const p = document.getElementById('settings-panel');
  if (!p) return;
  p.innerHTML = await _renderEmployeesPanel();
  // После рендера сразу заполняем таблицы
  _empRefreshTables();
}

let _empAcTimer = null;

function initEmployeeAutocomplete(inputId) {
  const inp = document.getElementById(inputId);
  if (!inp || inp._empAcInited) return;
  inp._empAcInited = true;
  const dd = document.createElement('div');
  dd.id = inputId + '-emp-dd';
  dd.style.cssText = `position:absolute;z-index:9999;background:var(--card-bg);
    border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);
    max-height:220px;overflow-y:auto;display:none;min-width:260px;left:0;top:100%`;
  inp.parentElement.style.position = 'relative';
  inp.parentElement.appendChild(dd);

  let _acIdx = -1;

  inp.addEventListener('input', () => {
    _acIdx = -1;
    clearTimeout(_empAcTimer);
    _empAcTimer = setTimeout(() => _fetchEmpSuggestions(inputId), 200);
  });
  inp.addEventListener('blur', () => setTimeout(() => { dd.style.display='none'; _acIdx=-1; }, 200));
  inp.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.emp-ac-item');
    if (e.key === 'Escape') { dd.style.display='none'; _acIdx=-1; return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _acIdx = Math.min(_acIdx + 1, items.length - 1);
      items.forEach((el, i) => el.style.background = i === _acIdx ? 'var(--surface2)' : '');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      _acIdx = Math.max(_acIdx - 1, 0);
      items.forEach((el, i) => el.style.background = i === _acIdx ? 'var(--surface2)' : '');
    } else if (e.key === 'Enter' && _acIdx >= 0 && items[_acIdx]) {
      e.preventDefault();
      items[_acIdx].click();
    } else if (e.key === 'Tab' && _acIdx >= 0 && items[_acIdx]) {
      e.preventDefault();
      items[_acIdx].click();
    }
  });
}

async function _fetchEmpSuggestions(inputId) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(inputId + '-emp-dd');
  if (!inp || !dd) return;
  const q = inp.value.trim();
  if (q.length < 1) { dd.style.display='none'; return; }
  try {
    const emps = (_empData || []).filter(e =>
      e.active !== false &&
      e.name.toLowerCase().includes(q.toLowerCase())
    ).slice(0, 8);
    if (!emps.length) { dd.style.display='none'; return; }
    dd.innerHTML = emps.map(e => `
      <div class="emp-ac-item" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
        onmousedown="event.preventDefault()"
        onmouseenter="this.style.background='var(--surface2)'"
        onmouseleave="this.style.background=''"
        onclick="_selectEmployee('${inputId}',${JSON.stringify(e.name)})">
        <div style="font-weight:600">${esc(e.name)}</div>
        ${e.dept||e.filial ? `<div style="font-size:11px;color:var(--muted)">${[e.dept,e.filial].filter(Boolean).join(' · ')}</div>` : ''}
      </div>`).join('');
    dd.style.display = 'block';
  } catch(e) { dd.style.display='none'; }
}

function _selectEmployee(inputId, name) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(inputId + '-emp-dd');
  if (inp) { inp.value = name; inp.dispatchEvent(new Event('change')); }
  if (dd)  dd.style.display = 'none';
}

async function _renderUsersPanel() {
  let users = [];
  try { users = await fetch(`${API}/api/users`, {headers:ah()}).then(r=>r.json()); } catch(e){}

  const ROLE_LABEL = { admin:'Администратор', operator:'Оператор', viewer:'Просмотр' };
  const ROLE_BADGE = { admin:'s-used', operator:'s-reserve', viewer:'s-off' };

  const rows = users.map(u => `
    <tr>
      <td><b>${esc(u.name)}</b></td>
      <td><span class="badge-s ${ROLE_BADGE[u.role]||'s-off'}">${ROLE_LABEL[u.role]||u.role}</span></td>
      <td><span class="badge-s ${u.active!==false?'s-used':'s-off'}">${u.active!==false?'активен':'откл.'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn-icon" title="Изменить" onclick="showEditUserModal('${u.id}','${esc(u.name)}','${u.role}','${esc(u.login||u.name)}')">✏️</button>
        ${u.id!=='sys-user-admin'?`
        <button class="btn-icon" title="${u.active!==false?'Деактивировать':'Активировать'}"
          onclick="toggleUserActive('${u.id}',${u.active===false})">${u.active!==false?'🔒':'🔓'}</button>
        <button class="btn-icon" title="Удалить" onclick="deleteUser('${u.id}','${esc(u.name)}')">🗑</button>
        `:''}
      </td>
    </tr>`).join('');

  return `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-title" style="margin:0">👥 Пользователи системы</div>
        <button class="btn btn-primary btn-sm" onclick="showCreateUserModal()">+ Добавить</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        Вход по логину и паролю. Оператор может редактировать оборудование, просмотрщик — только читать.
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Имя</th><th>Роль</th><th>Статус</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan="4" style="color:var(--muted);text-align:center">Нет пользователей</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

function showCreateUserModal() {

      <input id="cu-name" placeholder="Иванов Иван"/></div>

async function doCreateUser() {
  const name  = document.getElementById('cu-name')?.value.trim();
  const login = document.getElementById('cu-login')?.value.trim();
  const role  = document.getElementById('cu-role')?.value;
  const pin   = document.getElementById('cu-pin')?.value.trim();
  if (!name)  return toast('Введите имя', 'error');
  if (!login) return toast('Введите логин', 'error');
  if (!pin || pin.length < 4) return toast('Пароль — минимум 4 символа', 'error');
  const r = await fetch(`${API}/api/users`, {
    method:'POST', headers:ah(), body:JSON.stringify({name, login, role, pin})
  });
  const d = await r.json();
  if (r.ok) {
    closeModal(); toast('Пользователь создан', 'success');
    const panel = document.getElementById('settings-panel');
    if (panel) panel.innerHTML = await _renderUsersPanel();
  } else toast(d.error||'Ошибка', 'error');
}

function showEditUserModal(id, name, role, login) {
  showModal(`<h2>✏️ Изменить пользователя</h2>
    <div class="form-row"><label>Имя</label>
      <input id="eu-name" value="${esc(name)}"/></div>
    <div class="form-row"><label>Логин</label>
      <input id="eu-login" value="${esc(login||'')}"/></div>
    <div class="form-row"><label>Роль</label>
      <select id="eu-role">
        <option value="operator" ${role==='operator'?'selected':''}>Оператор</option>
        <option value="viewer"   ${role==='viewer'?'selected':''}>Просмотр</option>
        <option value="admin"    ${role==='admin'?'selected':''}>Администратор</option>
      </select>
    </div>
    <div class="form-row"><label>Новый пароль</label>
      <input type="password" id="eu-pin" placeholder="Оставьте пустым чтобы не менять"/></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doUpdateUser('${id}')">Сохранить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
}

async function doUpdateUser(id) {
  const name  = document.getElementById('eu-name')?.value.trim();
  const login = document.getElementById('eu-login')?.value.trim();
  const role  = document.getElementById('eu-role')?.value;
  const pin   = document.getElementById('eu-pin')?.value.trim();
  if (!login) return toast('Логин не может быть пустым', 'error');
  const body = {name, login, role};
  if (pin) { if (pin.length < 4) return toast('Пароль — минимум 4 символа', 'error'); body.pin = pin; }
  const r = await fetch(`${API}/api/users/${id}`, {
    method:'PUT', headers:ah(), body:JSON.stringify(body)
  });
  const d = await r.json();
  if (r.ok) {
    closeModal(); toast('Сохранено', 'success');
    const panel = document.getElementById('settings-panel');
    if (panel) panel.innerHTML = await _renderUsersPanel();
  } else toast(d.error||'Ошибка', 'error');
}

async function toggleUserActive(id, makeActive) {
  const r = await fetch(`${API}/api/users/${id}`, {
    method:'PUT', headers:ah(), body:JSON.stringify({active: makeActive})
  });
  if (r.ok) {
    const panel = document.getElementById('settings-panel');
    if (panel) panel.innerHTML = await _renderUsersPanel();
  } else toast('Ошибка', 'error');
}

async function deleteUser(id, name) {
  if (!confirm(`Удалить пользователя «${name}»?`)) return;
  const r = await fetch(`${API}/api/users/${id}`, {method:'DELETE', headers:ah()});
  const d = await r.json();
  if (r.ok) {
    toast('Удалено', 'success');
    const panel = document.getElementById('settings-panel');
    if (panel) panel.innerHTML = await _renderUsersPanel();
  } else toast(d.error||'Ошибка', 'error');
}

<script>
// ─── ТИПЫ УСТРОЙСТВ ──────────────────────────────────────────────────────────
const TAB_OPTIONS = [
  {v:'os',    l:'💻 ОС'},
  {v:'small', l:'🖱 Мелочи'},
  {v:'infra', l:'🌐 Инфра'},
];
const TAB_COLORS = {os:'#3b82f6',small:'#8b5cf6',infra:'#10b981'};
const TAB_LABELS_SHORT = {os:'ОС',small:'Мелочи',infra:'Инфра'};

async function _renderTypesPanel() {
  let types = [];
  try { types = await fetch(`${API}/api/type-codes`).then(r=>r.json()); } catch(e){}
  _typesBuffer = types;

  const rows = types.map((t,i) => {
    const tabSel = TAB_OPTIONS.map(o =>
      `<option value="${o.v}" ${(t.tab||'os')===o.v?'selected':''}>${o.l}</option>`
    ).join('');
    return `
    <tr>
      <td><code style="font-size:12px;color:var(--indigo)">${esc(t.code)}</code></td>

      <td>
        <select style="font-size:13px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:${TAB_COLORS[t.tab||'os']}"
          onchange="updateTypeCode(${i},'tab',this.value);this.style.color=TAB_COLORS[this.value]||'inherit'">
          ${tabSel}
        </select>
      </td>
      <td style="text-align:center">
        <button class="btn-icon" title="Удалить" onclick="deleteTypeCode(${i})">🗑</button>
      </td>
    </tr>`;
  }).join('');

  const summary = ['os','small','infra'].map(tab => {
    const n = types.filter(t=>(t.tab||'os')===tab).length;
    return `<span style="color:${TAB_COLORS[tab]};font-weight:600">${TAB_LABELS_SHORT[tab]}: ${n}</span>`;
  }).join(' &nbsp;·&nbsp; ');

  return `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="section-title" style="margin:0">🔧 Типы устройств и коллекции</div>
        <button class="btn btn-primary btn-sm" onclick="showAddTypeModal()">+ Добавить</button>
      </div>

let _typesBuffer = null;

async function _loadTypesBuffer() {
  if (!_typesBuffer) {
    _typesBuffer = await fetch(`${API}/api/type-codes`).then(r=>r.json()).catch(()=>[]);
  }
  return _typesBuffer;
}

function updateTypeCode(idx, field, value) {
  if (!_typesBuffer) return;
  _typesBuffer[idx][field] = value;
}

async function deleteTypeCode(idx) {
  const types = await _loadTypesBuffer();
  const t = types[idx];
  if (!confirm(`Удалить тип «${t.name}» (${t.code})?`)) return;
  _typesBuffer.splice(idx, 1);
  const panel = document.getElementById('settings-panel');
  if (panel) panel.innerHTML = await _renderTypesPanel();
}

function showAddTypeModal() {
  const opts = TAB_OPTIONS.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  showModal(`<h2>🔧 Новый тип устройства</h2>
    <div class="form-row"><label>Код * (2-5 букв)</label>
      <input id="at-code" placeholder="NB" maxlength="5"
        style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"/></div>
    <div class="form-row"><label>Название *</label>
      <input id="at-name" placeholder="Ноутбук"/></div>
    <div class="form-row"><label>Коллекция *</label>
      <select id="at-tab">${opts}</select></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doAddTypeCode()">Добавить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
}

async function doAddTypeCode() {
  const code = document.getElementById('at-code')?.value.trim().toUpperCase();
  const name = document.getElementById('at-name')?.value.trim();
  const tab  = document.getElementById('at-tab')?.value || 'os';
  if (!code || !name) return toast('Заполните все поля', 'error');
  const types = await _loadTypesBuffer();
  if (types.find(t => t.code === code)) return toast(`Код ${code} уже существует`, 'error');
  _typesBuffer.push({ code, name, tab });
  closeModal();
  const panel = document.getElementById('settings-panel');
  if (panel) panel.innerHTML = await _renderTypesPanel();
}

async function saveTypeCodes() {
  if (!_typesBuffer) return toast('Нет данных', 'error');
  const r = await fetch(`${API}/api/type-codes`, {
    method: 'PUT', headers: ah(),
    body: JSON.stringify({ codes: _typesBuffer })
  });
  const d = await r.json();
  if (r.ok) {
    toast('Типы устройств сохранены', 'success');
    _typesBuffer = null; // сбрасываем кэш
  } else toast(d.error || 'Ошибка', 'error');
}
</script>
