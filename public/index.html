<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IT ASSETS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
:root{
  --accent:#e94560;
  --indigo:#6366f1;--green:#10b981;--amber:#f59e0b;--purple:#8b5cf6;--cyan:#06b6d4;
  /* Light theme */
  --bg:#f0f2f5;--surface:#fff;--surface2:#f8fafc;
  --text:#1a1a2e;--text2:#334155;
  --border:#e2e8f0;--muted:#64748b;
  --header-bg:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  --header-text:#fff;
  --nav-bg:#fff;--card-bg:#fff;
  --input-bg:#f8fafc;--input-focus:#fff;
  --shadow:0 1px 6px rgba(0,0,0,.08);
  --red:var(--accent);
  /* Семантические цвета — светлая тема */
  --warn-bg:#fff8e1;--warn-border:#ffe082;--warn-text:#f57f17;
  --danger-bg:#fce4ec;--danger-border:#ef9a9a;--danger-text:#c62828;
  --success-bg:#f0fdf4;--success-border:#bbf7d0;--success-text:#065f46;
  --info-bg:#f5f3ff;--info-border:#ddd6fe;--info-text:#6d28d9;
  --noInv-bg:#fef2f2;--noInv-text:#dc2626;
  --noSerial-bg:#f5f3ff;--noSerial-text:#7c3aed;
  --alert-card-bg:#fff8e1;--alert-card-border:#ffe082;
  --mark-bg:#fef08a;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1b23;--surface2:#21222d;
  --text:#e8eaf0;--text2:#a8b0c0;
  --border:#2d2f3e;--muted:#6b7280;
  --header-bg:linear-gradient(135deg,#0a0b0f,#13141c,#1a1b23);
  --header-text:#e8eaf0;
  --nav-bg:#1a1b23;--card-bg:#1a1b23;
  --input-bg:#21222d;--input-focus:#2d2f3e;
  --shadow:0 1px 6px rgba(0,0,0,.4);
  /* Семантические цвета — тёмная тема */
  --warn-bg:#2a2000;--warn-border:#6b5000;--warn-text:#fbbf24;
  --danger-bg:#2a0a0a;--danger-border:#7f1d1d;--danger-text:#f87171;
  --success-bg:#031a0e;--success-border:#14532d;--success-text:#4ade80;
  --info-bg:#1e1b2e;--info-border:#4c1d95;--info-text:#a78bfa;
  --noInv-bg:#2a0a0a;--noInv-text:#f87171;
  --noSerial-bg:#1e1b2e;--noSerial-text:#a78bfa;
  --alert-card-bg:#2a2000;--alert-card-border:#6b5000;
  --mark-bg:#4a3f00;
}
#header{background:var(--header-bg);color:var(--header-text);padding:13px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.logo{font-size:21px;font-weight:800;letter-spacing:-.5px}.logo span{color:var(--accent)}
.hbadge{background:var(--accent);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.hml{margin-left:auto;display:flex;gap:8px;align-items:center}
.auth-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.auth-btn:hover{background:rgba(255,255,255,.25)}
#nav{display:flex;background:var(--nav-bg);padding:0 22px;border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);overflow-x:auto;gap:0}
.nav-btn{padding:11px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-btn.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent)}
.nav-auth{display:none}.body-auth .nav-auth{display:inline-block}
#app{padding:18px 22px;max-width:1500px;margin:0 auto}
.card{background:var(--card-bg);border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--card-bg);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.stat-num{font-size:28px;font-weight:800;line-height:1}.stat-lbl{font-size:12px;color:var(--muted);font-weight:500;margin-top:3px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 11px;text-align:left;border-bottom:2px solid var(--border);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr.clickable:hover td{background:var(--surface2);cursor:pointer}
.badge-s{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.s-used{background:var(--success-bg);color:var(--success-text);border:1px solid var(--success-border)}
.s-reserve{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border)}
.s-off{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}
.badge-cat{background:var(--surface2);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--muted)}
.badge-meta{background:#eff6ff;border-radius:6px;padding:2px 7px;font-size:11px;color:#1d4ed8;font-family:monospace}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text2)}
.btn-success{background:var(--green);color:#fff}.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}.btn-sm{padding:4px 9px;font-size:12px}
.btn-icon{padding:4px 8px;font-size:14px;background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text)}
.btn-icon:hover{background:var(--surface2)}
[data-theme="dark"] .btn-secondary{background:#2d2f3e;color:#c8cdd8;border:1px solid #3d3f50}
[data-theme="dark"] .btn-ghost{background:transparent;color:#8892a4;border:1px solid #3d3f50}
[data-theme="dark"] .btn-ghost:hover{background:#21222d}
[data-theme="dark"] .btn-danger{background:#3b1a1a;color:#f87171;border:1px solid #7f1d1d}
[data-theme="dark"] .btn-icon{border-color:#3d3f50;color:#a8b0c0}
[data-theme="dark"] .btn-icon:hover{background:#2d2f3e}
[data-theme="dark"] input[type="checkbox"]{accent-color:var(--accent)}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filter-sel{flex:1;min-width:130px;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--surface);color:var(--text)}
.filter-date{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--surface);color:var(--text)}
input,select,textarea{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--input-bg);font-family:inherit;color:var(--text)}
input:focus,select:focus{border-color:var(--accent);background:var(--input-focus)}
.search-inp{width:230px}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border-radius:16px;padding:26px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:16px;font-weight:800;margin-bottom:18px}
.form-row{margin-bottom:11px}.form-row label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-row textarea{height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.cat-tab{padding:4px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.bar-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.bar{height:11px;background:var(--indigo);border-radius:6px;min-width:6px}
.bar-lbl{width:155px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-num{font-size:12px;color:var(--muted);font-weight:600}
.alert-card{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-radius:10px;margin-bottom:7px;background:var(--alert-card-bg);border:1px solid var(--alert-card-border)}
.alert-card.danger{background:var(--danger-bg);border-color:var(--danger-border)}
#toast{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px}
.toast-msg{background:#1a1a2e;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:slideIn .3s ease;max-width:300px}
.toast-msg.success{background:#065f46}.toast-msg.error{background:#7f1d1d}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.no-resp{color:var(--accent);font-weight:600}
.mono{font-family:monospace;font-size:12px;color:var(--muted)}
.section-title{font-size:14px;font-weight:700;margin-bottom:12px}
.detail-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase}
.detail-val{font-size:13px;font-weight:500;margin-bottom:10px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;background:var(--surface2);border-radius:8px;padding:12px;margin-top:8px}
.spinner{display:block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-list{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{display:flex;align-items:center;gap:4px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;color:#1d4ed8}
.tag .del{cursor:pointer;opacity:.6;font-size:14px;line-height:1}.tag .del:hover{opacity:1}
.pw-mask{filter:blur(5px);user-select:none;cursor:pointer;transition:filter .2s}
.pw-mask.revealed{filter:none}
hr.sep{border:none;border-top:1px solid var(--border);margin:16px 0}
@media(max-width:700px){.two-col,.three-col{grid-template-columns:1fr}.search-inp{width:100%}}

/* ── Печать карточки ─────────────────────────────────────── */
@media print {
  body > *:not(#print-frame) { display: none !important; }
  #print-frame {
    display: block !important;
    position: fixed; inset: 0;
    background: #fff; color: #000;

  #print-frame .pf-label  { color: #666; font-size: 8pt; text-transform: uppercase; letter-spacing: .5px; }
  #print-frame .pf-val    { font-weight: 600; font-family: 'Courier New', monospace; font-size: 11pt; }

  #print-frame .pf-hint   { font-size: 7pt; color: #888; margin-top: 2mm; }
}
@media screen {
  #print-frame { display: none; }
}

<script>

// ── Глобальный обработчик ошибок (для беты) ──────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
  const text = `JS Error: ${msg}\n${src}:${line}:${col}`;
  console.error('[IT-ASSETS ERROR]', text, err);
  // Показываем toast если функция уже определена
  if (typeof toast === 'function') toast('Ошибка интерфейса: ' + msg.slice(0, 80), 'error');
  return false;
};
window.addEventListener('unhandledrejection', e => {
  console.error('[IT-ASSETS UNHANDLED]', e.reason);
  if (typeof toast === 'function') toast('Ошибка запроса: ' + String(e.reason).slice(0, 80), 'error');
});

// ── QR-генератор: использует серверный /api/qr (библиотека qrcode npm) ─────────
// Совместимый API: new QRCode(el, {text, width, height})
// Запрашивает SVG с сервера и вставляет как <img> через blob URL
function QRCode(el, opts) {
  const text = (opts && opts.text) ? opts.text : String(opts || '');
  const w    = (opts && opts.width)  || 200;
  const h    = (opts && opts.height) || 200;
  el.innerHTML = '';
  const url = '/api/qr?text=' + encodeURIComponent(text);
  const img = document.createElement('img');
  img.src    = url;
  img.width  = w;
  img.height = h;
  img.style.display = 'block';
  img.onerror = () => { el.textContent = 'QR: ' + text; };
  el.appendChild(img);
}
QRCode.CorrectLevel = { L: 1, M: 0, Q: 3, H: 2 };
// ── конец QR-генератора ───────────────────────────────────────────────────────

// ── ТЕМА ─────────────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('itassets_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Применяем сохранённые стили сразу из localStorage (без ожидания сервера)
  try {
    const styles = JSON.parse(localStorage.getItem('itassets_styles') || '{}');
    const dark   = saved === 'dark';
    const accent = dark ? (styles.accent_dark||'') : (styles.accent_light||'');
    if (accent) document.documentElement.style.setProperty('--accent', accent);
  } catch(e) {}
})();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('itassets_theme', next);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}

function applyStoredStyles(s) {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const accent = dark ? (s.accent_dark||'#e94560') : (s.accent_light||'#e94560');
  const headerBg = dark ? (s.header_dark||null) : (s.header_light||null);
  document.documentElement.style.setProperty('--accent', accent);
  if (headerBg) document.documentElement.style.setProperty('--header-bg', headerBg);
}

function _initThemeBtn() {
  const btn = document.getElementById('theme-toggle');
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  if (btn) btn.textContent = cur === 'dark' ? '☀️' : '🌙';
}

</script>

<div id="header">
  <div id="company-logo-wrap" style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="switchTab('dashboard')" title="Перейти на дашборд">
    <div id="company-logo-svg" style="display:none;height:36px"></div>
    <div id="company-logo-emoji" style="font-size:24px">🖥️</div>
    <div><div class="logo" id="company-logo">IT<span>ASSETS</span></div><div style="font-size:11px;opacity:.6;margin-top:1px">Управление ИТ-оборудованием <span style="font-size:10px;opacity:.5;font-weight:400"><span id="app-version">…</span></span></div></div>
  </div>
  <div class="hml">
    <button id="theme-toggle" onclick="toggleTheme()" title="Переключить тему"
      style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:15px">🌙</button>
    <span id="total-badge" class="hbadge">...</span>
    <span id="auth-status" style="font-size:12px;opacity:.8">👁 Просмотр</span>
    <button class="auth-btn" id="auth-btn" onclick="toggleAuth()">🔐 Войти</button>
  </div>
</div>
<div id="nav">
  <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Дашборд</button>
  <button class="nav-btn nav-auth" data-tab="os"       onclick="switchTab('os')">💻 ОС</button>
  <button class="nav-btn nav-auth" data-tab="small"    onclick="switchTab('small')">🖱 Мелочи</button>
  <button class="nav-btn nav-auth" data-tab="infra"    onclick="switchTab('infra')">🌐 Инфра</button>
  <button class="nav-btn nav-auth" data-tab="history"  onclick="switchTab('history')">🔄 История</button>

  <button class="nav-btn nav-auth" data-tab="alerts"   onclick="switchTab('alerts')">⚠️ Внимание</button>

<script>
const API = '';
let authPassword = null;
let currentUser = null; // { id, name, role }
let currentTab = 'dashboard';
let currentCat = '';
let assetsCache = [];
let catsCache = {};
let searchVal = '', fOrg = 'Все', fFilial = 'Все', fStatus = 'Все';
let sortCol = '', sortDir = 1; // 1=asc, -1=desc
let currentPage  = 1;
const PAGE_SIZE  = 50;
let selectedIds  = new Set();
let _companyName = ''; // кэш названия компании
let _appVersion  = ''; // кэш версии приложения
let _searchTimer = null;
function onSearchInput(val, tab) {
  searchVal = val;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    renderAssetTab(tab).then(() => {
      const inp = document.querySelector('.search-inp');
      if (inp) inp.focus();
    });
  }, 250);
}
let _histSearchTimer = null;
function onHistSearchInput(val) {
  histFilters.search = val;
  histPage = 1;
  clearTimeout(_histSearchTimer);
  _histSearchTimer = setTimeout(() => {
    renderHistory();
    setTimeout(() => {
      const inp = document.querySelector('.search-inp');
      if (inp) inp.focus();
    }, 0);
  }, 250);
}
let currentDetailAsset = null;
let invCodes = { orgs:{}, types:{} };

// ─── AUTH ─────────────────────────────────────────────────────────────────────

function toggleAuth() {
  if (canEdit()) {
    authPassword = null;
    currentUser  = null;
    _updateAuthUI();
    toast('Вышли из системы');
    render(); return;
  }
  _showLoginModal();
}

async function _showLoginModal() {
  showModal(`<h2>🔐 Вход в систему</h2>
    <div class="form-row">
      <label>Логин</label>
      <input type="text" id="m-login" autofocus placeholder="Введите логин" autocomplete="username"/>
    </div>
    <div class="form-row">
      <label>Пароль</label>
      <input type="password" id="m-pwd" placeholder="Введите пароль" autocomplete="current-password"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doLogin()">Войти</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
  setTimeout(()=>document.getElementById('m-login')?.focus(), 80);
}

async function doLogin() {
  try {
    const login = document.getElementById('m-login')?.value.trim() || '';
    const pwd   = document.getElementById('m-pwd')?.value || '';
    if (!login) return toast('Введите логин', 'error');

    const r = await fetch(`${API}/api/users/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ login, password: pwd })
    });
    const d = await r.json();
    if (r.ok) {
      currentUser  = d.user;
      authPassword = pwd;
      _updateAuthUI();
      closeModal();
      toast(`Добро пожаловать, ${currentUser.name}!`, 'success');
      render();
      // Баннер смены дефолтного пароля
      if (d.warn_default_pin) {
        setTimeout(() => _showDefaultPinWarning(), 600);
      }
    } else toast(d.error || 'Неверный логин или пароль', 'error');
  } catch(e) { toast('Ошибка соединения с сервером', 'error'); }
}

function _showDefaultPinWarning() {
  const html = `
    <div style="padding:24px;max-width:420px">
      <div style="font-size:22px;margin-bottom:12px">⚠️ Смените пароль администратора</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:18px">
        Вы вошли под стандартным паролем <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">admn0000</code>.
        Это пароль по умолчанию из документации — он известен всем в сети.<br><br>
        Смените его прямо сейчас, чтобы защитить систему.
      </div>
      <div style="margin-bottom:12px">

async function doChangeDefaultPin() {
  const p1 = document.getElementById('new-pin-inp')?.value || '';
  const p2 = document.getElementById('new-pin-inp2')?.value || '';
  if (p1.length < 4) return toast('Пароль должен быть не короче 4 символов', 'error');
  if (p1 !== p2)     return toast('Пароли не совпадают', 'error');
  try {
    const r = await fetch(`${API}/api/settings/password`, {
      method:'PUT', headers:{'Content-Type':'application/json','x-user-id':currentUser?.id,'x-edit-password':authPassword},
      body: JSON.stringify({ newPassword: p1 })
    });
    const d = await r.json();
    if (r.ok) {
      authPassword = p1;
      closeModal();
      toast('Пароль успешно изменён ✅', 'success');
    } else toast(d.error || 'Ошибка смены пароля', 'error');
  } catch(e) { toast('Ошибка соединения', 'error'); }
}

function _updateAuthUI() {
  const btn    = document.getElementById('auth-btn');
  const status = document.getElementById('auth-status');
  const authed = !!currentUser;

  // Показываем/скрываем защищённые вкладки навигации
  document.body.classList.toggle('body-auth', authed);

  if (!authed) {
    if (btn)    btn.textContent     = '🔐 Войти';
    if (status) status.textContent  = '👁 Просмотр';
    // Если были на закрытой вкладке — возвращаем на дашборд
    const protectedTabs = ['os','small','infra','history','accounts','alerts','settings'];
    if (protectedTabs.includes(currentTab)) {
      currentTab = 'dashboard';
      document.querySelectorAll('.nav-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === 'dashboard'));
    }
    return;
  }

  const roleLabel = currentUser?.role === 'admin' ? 'Администратор'
                  : currentUser?.role === 'viewer' ? 'Просмотр' : 'Оператор';
  if (btn)    btn.textContent  = '🚪 Выйти';
  if (status) status.textContent = `${currentUser.name} · ${roleLabel}`;
}

function ah() {
  const h = {'Content-Type':'application/json'};
  if (canEdit()) h['x-edit-password'] = authPassword;
  if (currentUser?.id) h['x-user-id'] = currentUser.id;
  return h;
}

// Проверка прав
function canEdit()  { return !!currentUser && currentUser?.role !== 'viewer'; }
function canAdmin() { return !!currentUser && currentUser?.role === 'admin'; }

  const _protected = ['os','small','infra','history','accounts','alerts','settings'];

  currentTab=tab; currentCat=''; searchVal=''; fOrg='Все'; fFilial='Все'; fStatus='Все'; sortCol=''; sortDir=1;

  try {

      _updateLogoEl(s.company_name, s.logo_svg || '');
    }
    if (s.version) {
      const v = s.version
        .replace(/^alpha-(\d+)-/, 'α$1 · ')

    }

      [catsCache, invCodes] = await Promise.all([
        fetch(`${API}/api/categories`).then(r=>r.json()).catch(()=>({os:['Оборудование пользователей','Оргтехника','Мини ПК'],small:['Периферия','Гарнитуры','Колонки'],infra:['Сетевое оборудование','Wi-Fi','Принтеры','Видеонаблюдение','ИБП','Серверы']})),
        fetch(`${API}/api/inv/codes`).then(r=>r.json()).catch(()=>({orgs:{},types:{}}))
      ]);
    }
    if (currentTab==='dashboard') return await renderDashboard();
    if (currentTab==='history')   return await renderHistory();
    if (currentTab==='accounts')  return await renderAccounts();

let _gsTimer = null;
let _gsLastQuery = '';

function globalSearchDebounce(q) {
  clearTimeout(_gsTimer);
  _gsTimer = setTimeout(() => runGlobalSearch(q.trim()), 280);
}

async function runGlobalSearch(q) {
  const resultsEl = document.getElementById('global-search-results');
  const clearBtn  = document.getElementById('global-search-clear');
  if (!resultsEl) return;

  if (!q || q.length < 2) {
    resultsEl.style.maxHeight = '0';
    resultsEl.style.marginTop = '0';
    if (clearBtn) clearBtn.style.display = 'none';
    return;
  }

  if (clearBtn) clearBtn.style.display = '';
  _gsLastQuery = q;

  resultsEl.style.marginTop = '12px';
  resultsEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:4px 0">Поиск...</div>';
  resultsEl.style.maxHeight = '60px';

  try {
    const resp = await fetch(`${API}/api/assets/search?q=${encodeURIComponent(q)}`);
    if (!resp.ok) throw new Error(resp.status);
    const items = await resp.json();

    if (q !== _gsLastQuery) return; // устаревший результат

    if (!items.length) {
      resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:6px 0">Ничего не найдено по запросу «${esc(q)}»</div>`;
      resultsEl.style.maxHeight = '60px';
      return;
    }

    const TAB_LABEL = { os:'💻 ОС', small:'🖱 Мелочи', infra:'🌐 Инфра' };

    // Группируем по вкладке
    const byTab = {};
    items.forEach(a => { (byTab[a.tab] = byTab[a.tab]||[]).push(a); });

    const rows = items.slice(0, 30).map(a => {
      const hl = (s) => {
        if (!s) return '—';
        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
        return esc(s).replace(re, '<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">$1</mark>');
      };
      return `<tr style="cursor:pointer" onclick="openAssetFromSearch('${a.tab}','${a.id}')"
        onmouseenter="this.style.background='var(--surface)'" onmouseleave="this.style.background=''">
        <td style="white-space:nowrap">
          <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:var(--surface);color:var(--muted)">${TAB_LABEL[a.tab]||a.tab}</span>
        </td>
        <td><code style="font-size:11px;color:var(--indigo)">${hl(a.inv||'—')}</code></td>
        <td style="font-size:12px">${ic(a.type)} ${hl(a.type)}</td>
        <td style="font-weight:600;font-size:13px">${hl(a.model)}</td>
        <td style="font-size:12px;color:var(--muted)">${hl(a.serial||'—')}</td>
        <td style="font-size:12px">${hl(a.responsible||'—')}</td>
        <td style="font-size:12px;color:var(--muted)">${esc(a.org||'—')} · ${esc(a.filial||'—')}</td>
        <td><span class="badge-s ${a.status==='используется'?'s-used':a.status==='резерв'?'s-reserve':'s-off'}">${esc(a.status)}</span></td>
        <td><button class="btn-icon" onclick="event.stopPrshowDetail(\'${a.id}\')tle="Открыть карточку">→</button></td>
      </tr>`;
    }).join('');

    const moreNote = items.length > 30
      ? `<tr><td colspan="9" style="text-align:center;color:var(--muted);font-size:12px;padding:8px">
           Показаны первые 30 из ${items.length}. Уточните запрос.
         </td></tr>`
      : '';

    resultsEl.innerHTML = `
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">
        Найдено: <b>${items.length}</b> ${items.length===1?'запись':items.length<5?'записи':'записей'}
        по запросу «${esc(q)}»
      </div>
      <div class="tbl-wrap" style="border-radius:8px;border:1px solid var(--border)">
        <table style="font-size:13px">
          <thead><tr><th>Вкладка</th><th>Инв. №</th><th>Тип</th><th>Модель</th><th>Серийный №</th><th>Ответственный</th><th>Орг · Филиал</th><th>Статус</th><th></th></tr></thead>
          <tbody>${rows}${moreNote}</tbody>
        </table>
      </div>`;
    resultsEl.style.maxHeight = '600px';

  } catch(e) {
    resultsEl.innerHTML = `<div style="color:var(--noInv-text);font-size:13px">Ошибка поиска: ${e.message}</div>`;
    resultsEl.style.maxHeight = '60px';
  }
}

  if (!_orgsCache.length) await ensureRefData();
  const app=document.getElementById('app');
  const cats=catsCache[tab]||[];
  const params=new URLSearchParams({tab});
  if (currentCat&&currentCat!=='Все') params.set('category',currentCat);
  if (fOrg!=='Все') params.set('org',fOrg);
  if (fFilial!=='Все') params.set('filial',fFilial);
  if (fStatus!=='Все') params.set('status',fStatus);
  if (searchVal) params.set('search',searchVal);
  app.innerHTML='<div class="spinner"></div>';
  const _resp=await fetch(`${API}/api/assets?${params}`).then(r=>r.json());
  const assets = Array.isArray(_resp) ? _resp : (_resp.items || []);
  const totalAssets = _resp.total ?? assets.length;
  const totalPages  = _resp.pages ?? 1;
  assetsCache=assets;
  document.getElementById('total-badge').textContent=totalAssets+' единиц';
  // Словарь org_id → name для отображения в таблице
  const _orgMap = Object.fromEntries((_orgsCache||[]).map(o=>[o.id, o.name]));
  // Орг — из справочника (не из отфильтрованных ассетов!) чтобы dropdown не урезался
  const _allOrgs=['Все',...(_orgsCache.length
    ? _orgsCache.filter(o=>o.status==='active'&&!o.system).map(o=>o.name)
    : [...new Set(assets.map(a=>a.org||'').filter(Boolean))]
  )].sort((a,b)=>a==='Все'?-1:b==='Все'?1:a.localeCompare(b,'ru'));
  // Филиалы — из справочника (как орги), чтобы фильтр не урезался по текущей странице
  const filials = ['Все', ...(_filialsCache.length
    ? _filialsCache.filter(f => f.status !== 'closed').map(f => f.name)
    : [...new Set(assets.map(a => a.filial).filter(Boolean))]
  )].sort((a,b) => a==='Все'?-1 : b==='Все'?1 : a.localeCompare(b,'ru'));
  // Сортировка
  if (sortCol) {
    assets.sort((a, b) => {
      const getVal = (obj, col) => {
        if (col === 'filial') return ((obj.filial||'') + ' ' + (obj.location||'')).toLowerCase();
        if (col === 'org') return (_orgMap[obj.org_id] || obj.org || '').toLowerCase();
        return (obj[col]||'').toString().toLowerCase();
      };
      const av = getVal(a, sortCol), bv = getVal(b, sortCol);
      if (sortCol === 'inv') {
        const numA = parseInt((av.match(/\d+$/) || ['0'])[0]);
        const numB = parseInt((bv.match(/\d+$/) || ['0'])[0]);
        if (!isNaN(numA) && !isNaN(numB)) return (numA - numB) * sortDir;
      }
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }
  const showMeta = tab==='infra';

  app.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:16px;font-weight:700">${TAB_LABELS[tab]||tab}
      <span style="color:var(--muted);font-weight:400;font-size:13px">(${assets.length})</span>
    </div>
    <div style="display:flex;gap:6px">
      ${canEdit()?`<button class="btn btn-secondary btn-sm" onclick="showCatEditor('${tab}')" title="Категории для группировки оборудования">📂 Категории</button>`:''}
      <a href="${API}/api/export/csv?tab=${tab}" class="btn btn-secondary btn-sm">⬇ CSV</a>
      ${canEdit()?`<button class="btn btn-primary btn-sm" onclick="showAddModal('${tab}')">＋ Добавить</button>`:''}
    </div>
  </div>
  <div class="cat-tabs">
    ${['Все',...cats].map(c=>{const val=c==='Все'?'':c;return `<div class="cat-tab ${(currentCat||'Все')===c?'active':''}" onclick="currentCat='${val}';renderAssetTab('${tab}')">${c}</div>`;}).join('')}
  </div>
  ${canEdit() && selectedIds.size > 0 ? `
  <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;
    background:var(--accent-dim,var(--surface2));border:1px solid var(--accent);
    border-radius:10px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:700;color:var(--accent)">☑ Выбрано: ${selectedIds.size}</span>
    <button class="btn btn-primary btn-sm" onclick="showBulkMoveModal('${tab}')">→ Переместить</button>
    <button class="btn btn-secondary btn-sm" onclick="showBulkInvModal('${tab}')">🏷 Инв. №</button>
    <button class="btn btn-danger btn-sm" onclick="showBulkRetireModal('${tab}')">🗑 Списать</button>
    <button class="btn btn-ghost btn-sm" onclick="clearSelection('${tab}')">✕ Снять</button>
  </div>` : ''}
  <div class="card" style="margin-bottom:0">
    <div class="filters">
      <input class="search-inp" type="text" placeholder="🔍 Поиск..." value="${esc(searchVal)}"
        oninput="onSearchInput(this.value,'${tab}')"/>
      <select onchange="fOrg=this.value;fFilial='Все';renderAssetTab('${tab}')">
        ${_allOrgs.map(o=>`<option ${fOrg===o?'selected':''}>${esc(o)}</option>`).join('')}
      </select>
      <select onchange="fFilial=this.value;renderAssetTab('${tab}')">
        ${filials.map(f=>`<option ${fFilial===f?'selected':''}>${esc(f)}</option>`).join('')}
      </select>
      <select onchange="fStatus=this.value;renderAssetTab('${tab}')">
        ${['Все','используется','резерв'].map(s=>`<option ${fStatus===s?'selected':''}>${s}</option>`).join('')}
      </select>
      ${(searchVal||fOrg!=='Все'||fFilial!=='Все'||fStatus!=='Все')?
        `<button class="btn btn-ghost btn-sm" onclick="searchVal='';fOrg='Все';fFilial='Все';fStatus='Все';sortCol='';sortDir=1;renderAssetTab('${tab}')">✕ Сброс</button>`:''}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        ${canEdit()?`<th style="width:32px"><input type="checkbox" id="sel-all" title="Выбрать все / снять все"
          onchange="toggleSelectAll(this.checked,'${tab}')"/></th>`:''}
        ${thSort('inv','Инв. №')}${thSort('type','Тип')}${thSort('model','Модель')}${thSort('serial','Серийный №')}
        ${showMeta?'<th>IP</th><th>MAC</th>':''}
        ${thSort('responsible','Ответственный')}${thSort('filial','Филиал / Место')}${thSort('org','Орг.')}
        <th>Коллекция</th>${thSort('status','Статус')}
        ${canEdit()?'<th></th>':''}
      </tr></thead>
      <tbody>${assets.map(a=>`
        <tr class="clickable" onclick="showDetail('${a.id}')" id="row-${a.id}">
          ${canEdit()?`<td onclick="event.stopPropagation()" style="width:32px;text-align:center"><input type="checkbox" class="row-cb" data-id="${a.id}" ${selectedIds.has(a.id)?'checked':''} onchange="toggleSelectOne('${a.id}',this.checked,'${tab}')"/></td>`:''}
          <td class="mono" style="font-size:11px">${a.inv?`<span style="background:#eff6ff;color:#1d4ed8;border-radius:5px;padding:2px 6px;font-weight:600">${esc(a.inv)}</span>`:'<span style="color:#cbd5e1">—</span>'}</td>
          <td>${ic(a.type)} <span style="font-weight:500">${esc(a.type)}</span></td>
          <td><b>${esc(a.model)}</b></td>
          <td class="mono">${esc(a.serial)||'—'}</td>
          ${showMeta?`<td><span class="badge-meta">${esc(a.meta?.ip)||'—'}</span></td>
            <td class="mono" style="font-size:11px">${esc(a.meta?.mac)||'—'}</td>`:''}
          <td>${(!a.responsible||a.responsible==='?'||a.responsible==='—')
            ?'<span class="no-resp">Не назначен</span>':esc(a.responsible)}</td>
          <td><b>${esc(a.filial)}</b>${a.location?` <span style="color:var(--muted)">· ${esc(a.location)}</span>`:''}</td>
          <td style="font-size:11px;color:var(--muted);white-space:nowrap">${esc(_orgMap[a.org_id]||a.org||'—')}</td>
          <td><span class="badge-cat">${esc(a.category)}</span></td>
          <td><span class="badge-s ${sc(a.status)}">${a.status}</span></td>
          ${canEdit()?`<td onclick="event.stopPropagation()" style="white-space:nowrap">
            <button class="btn btn-secondary btn-sm" onclick="showMoveModal('${a.id}')">→</button>
            <button class="btn-icon" onclick="showEditModal('${a.id}')" title="Изменить">✏️</button>
          </td>`:''}
        </tr>`).join('')}
      </tbody></table></div>

  ${renderPaginator(totalPages, totalAssets)}
  </div>`;

  // Синхронизируем состояние sel-all чекбокса
  setTimeout(() => {
    const selAll = document.getElementById('sel-all');
    if (!selAll) return;
    const cbs = document.querySelectorAll('.row-cb');
    if (cbs.length === 0) { selAll.checked = false; selAll.indeterminate = false; return; }
    const checkedCount = [...cbs].filter(cb => cb.checked).length;
    selAll.checked       = checkedCount === cbs.length;
    selAll.indeterminate = checkedCount > 0 && checkedCount < cbs.length;
  }, 0);
}

// ─── CATEGORY EDITOR ─────────────────────────────────────────────────────────
function showCatEditor(tab) {
  const cats = catsCache[tab]||[];
  showModal(`<h2>📂 Категории — ${TAB_LABELS[tab]||tab}</h2>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
      Категории используются для группировки оборудования на вкладке.<br>
      При удалении категории — оборудование из неё <b>не удаляется</b>, только снимается метка.
    </div>
    <div id="tag-container" class="tag-list">${cats.map(c=>`
      <div class="tag" id="tag-${btoa(c)}">
        ${esc(c)}
        <span class="del" onclick="removeTag('${tab}','${esc(c)}')">×</span>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:7px;margin-top:14px">
      <input id="new-cat-inp" style="flex:1" placeholder="Новая коллекция..." 
        onkeydown="if(event.key==='Enter')addTag('${tab}')"/>
      <button class="btn btn-success" onclick="addTag('${tab}')">Добавить</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveCats('${tab}')">Сохранить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`);
}
let editingCats = [];
function removeTag(tab, name) {
  const id = 'tag-'+btoa(name);
  document.getElementById(id)?.remove();
}
function addTag(tab) {
  const inp = document.getElementById('new-cat-inp');
  const val = inp.value.trim();
  if (!val) return;
  const id = 'tag-'+btoa(val);
  if (document.getElementById(id)) { inp.value=''; return; }
  const div = document.createElement('div');
  div.className='tag'; div.id=id;
  div.innerHTML=`${esc(val)} <span class="del" onclick="this.parentElement.remove()">×</span>`;
  document.getElementById('tag-container').appendChild(div);
  inp.value='';
}
async function saveCats(tab) {
  const tags = [...document.querySelectorAll('#tag-container .tag')]
    .map(t=>t.childNodes[0].textContent.trim()).filter(Boolean);
  const r = await fetch(`${API}/api/categories/${tab}`,{method:'PUT',headers:ah(),body:JSON.stringify({categories:tags})});
  if (r.ok) {
    catsCache[tab] = tags;
    closeModal(); toast('Коллекции сохранены','success'); render();
  } else toast('Ошибка','error');
}

async function importHistory() {
  const file=document.getElementById('csv-file').files[0];
  if (!file) return toast('Выберите файл истории','error');
  const setP=(pct,label)=>{
    document.getElementById('import-progress').style.display='block';
    document.getElementById('import-progress-bar').style.width=pct+'%';
    document.getElementById('import-progress-label').textContent=label;
  };
  const btn=document.getElementById('import-btn');
  btn.disabled=true;
  document.getElementById('import-result').innerHTML='';
  setP(5,'Читаю файл...');
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
  if (lines.length<2){btn.disabled=false;return toast('Файл пустой','error');}
  setP(20,'Разбираю строки...');
  const sep=lines[0].includes(';')?';':',';
  function parseRow(line){const res=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===sep&&!inQ){res.push(cur);cur='';}else cur+=c;}
    res.push(cur);return res;}
  const headers=parseRow(lines[0]).map(h=>h.trim().toLowerCase());
  const MAP={'дата':'date','от кого':'from_who','кому':'to_who','оборудование':'equipment',
    'причина':'reason','тип события':'action_type','кто изменил':'changed_by'};
  const rows=lines.slice(1).map(l=>{
    const vals=parseRow(l);const row={};
    headers.forEach((h,i)=>{const k=MAP[h];if(k)row[k]=vals[i]||'';});
    return row;}).filter(r=>r.date||r.equipment);
  if (!rows.length){btn.disabled=false;return toast('Нет данных','error');}
  setP(40,`Найдено ${rows.length} записей, отправляю...`);
  let animPct=40;
  const anim=setInterval(()=>{if(animPct<85){animPct+=0.5;document.getElementById('import-progress-bar').style.width=animPct+'%';}},80);
  const r=await fetch(`${API}/api/import/history`,{method:'POST',headers:ah(),body:JSON.stringify({rows})});
  clearInterval(anim);
  const d=await r.json();
  btn.disabled=false;
  if (r.ok){
    setP(100,`Готово: добавлено ${d.added}`);
    document.getElementById('import-progress-bar').style.background='linear-gradient(90deg,#10b981,#059669)';
    document.getElementById('import-result').innerHTML=`<span style="color:#065f46">✅ История добавлена: ${d.added} записей</span>`;
    toast('История импортирована: '+d.added,'success');
    setTimeout(()=>renderHistory(true), 800);
  } else {
    setP(100,'Ошибка');
    document.getElementById('import-progress-bar').style.background='#ef4444';
    toast(d.error||'Ошибка','error');
  }
}

function renderPaginator(totalPages, totalAssets) {
  if (totalPages <= 1) return '';
  const from = (currentPage - 1) * PAGE_SIZE + 1;
  const to   = Math.min(currentPage * PAGE_SIZE, totalAssets);
  let btns = '';
  const prevDis = currentPage <= 1 ? ' disabled' : '';
  const nextDis = currentPage >= totalPages ? ' disabled' : '';
  btns += `<button class="btn btn-ghost btn-sm"${prevDis} onclick="gotoPage(${currentPage-1})">← Пред</button>`;
  let lastWasDots = false;
  for (let p = 1; p <= totalPages; p++) {
    const near = Math.abs(p - currentPage) <= 2 || p === 1 || p === totalPages;
    if (near) {
      const cls = p === currentPage ? 'btn-primary' : 'btn-ghost';
      btns += `<button class="btn btn-sm ${cls}" onclick="gotoPage(${p})">${p}</button>`;
      lastWasDots = false;
    } else if (Math.abs(p - currentPage) === 3 && !lastWasDots) {
      btns += '<span style="color:var(--muted);padding:0 4px">…</span>';
      lastWasDots = true;
    }
  }
  btns += `<button class="btn btn-ghost btn-sm"${nextDis} onclick="gotoPage(${currentPage+1})">След →</button>`;
  btns += `<span style="font-size:12px;color:var(--muted);margin-left:8px">${from}–${to} из ${totalAssets}</span>`;
  return `<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:14px;flex-wrap:wrap">${btns}</div>`;
}

function _updateInvTypeOpts(orgId, orgs) {
  const org = orgs.find(o => o.id === orgId);
  const sel = document.getElementById('bi-type');
  if (!sel || !org) return;
  const rules = (org.inv_rules||[]).filter(r => r.active !== false);
  sel.innerHTML = rules.map(r =>
    `<option value="${r.type_code}">${r.type_name || r.type_code} → ${org.short_code}-${r.type_code}-XXXXX</option>`
  ).join('');
  _updateInvPreview(org);
}

function _updateInvPreview(org) {
  const preview = document.getElementById('bi-preview');
  if (!preview) return;
  const tc = document.getElementById('bi-type')?.value;
  if (!tc || !org) return;
  const rule = (org.inv_rules||[]).find(r=>r.type_code===tc);
  const next = (rule?.counter||0) + 1;
  preview.textContent = `Следующий номер: ${org.short_code}-${tc}-${String(next).padStart(5,'0')}`;
}

async function doBulkRetire(tab) {
  const reason = document.getElementById('br-reason')?.value.trim() || 'Массовое списание';
  const ids = [...selectedIds];
  closeModal();
  let ok = 0, fail = 0;
  for (const id of ids) {
    const r = await fetch(`${API}/api/assets/${id}`, {
      method: 'DELETE',
      headers: { ...ah(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason })
    });
    if (r.ok) ok++; else fail++;
  }
  selectedIds.clear();
  if (ok)   toast(`Списано: ${ok} ед.`, 'success');
  if (fail) toast(`Ошибок: ${fail}`, 'error');
  renderAssetTab(tab);
}

async function doBulkMove(tab) {
  const newResponsible = document.getElementById('bm-resp')?.value.trim();
  const newFilial      = document.getElementById('bm-filial')?.value;
  const newLocation    = document.getElementById('bm-loc')?.value;
  const reason         = document.getElementById('bm-reason')?.value.trim();
  if (!newResponsible && !newFilial && !newLocation)
    return toast('Заполните хотя бы одно поле', 'error');
  const r = await fetch(`${API}/api/assets/bulk-move`, {
    method:'POST', headers:ah(),
    body:JSON.stringify({ ids:[...selectedIds], newResponsible, newFilial, newLocation, reason })
  });
  const d = await r.json();
  if (r.ok) {
    closeModal();
    toast(`Перемещено: ${d.ok}${d.failed?.length?' | Ошибок: '+d.failed.length:''}`, 'success');
    selectedIds.clear();
    renderAssetTab(tab);
  } else toast(d.error||'Ошибка', 'error');
}

function thSort(col, label) {
  const active = sortCol === col;
  const arrow  = active ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
  const style  = active
    ? 'cursor:pointer;user-select:none;color:var(--indigo);white-space:nowrap'
    : 'cursor:pointer;user-select:none;white-space:nowrap';
  return `<th style="${style}" onclick="setSort('${col}')">${label}${arrow}</th>`;
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  currentPage = 1;
  renderAssetTab(currentTab);
}

async function loadBackupList() {

            <button class="btn-icon" title="Восстановить" onclick="restoreBackup('${esc(b.name)}', ${b.full})">↩</button>
          </td>
        </tr>`).join('')}
      </tbody>

      🔒 полный (db + config) &nbsp;·&nbsp; ⚠️ только db.json
    </div>`;
}

async function restoreBackup(name, isFull) {
  const warn = isFull
    ? `Восстановить базу из «${name}»?\n\nБудут восстановлены db.json и config.json.\nТекущее состояние будет сохранено как pre-restore бэкап.`
    : `Восстановить базу из «${name}»?\n\n⚠ Этот бэкап содержит только db.json — организации и настройки НЕ будут восстановлены.\nТекущее состояние будет сохранено как pre-restore бэкап.`;
  if (!confirm(warn)) return;
  const r = await fetch(`${API}/api/backup/restore/${encodeURIComponent(name)}`, { method:'POST', headers:ah() });
  const d = await r.json();
  if (r.ok) {
    if (d.warn) toast(`Восстановлено с предупреждением: ${d.warn}`, 'error');
    else toast('База восстановлена. Перезагружаю страницу...', 'success');
    setTimeout(() => location.reload(), 1500);
  } else toast(d.error || 'Ошибка', 'error');
}

async function switchSettingsTab(tab) {
  _settingsTab = tab;
  const isAdmin = canAdmin();
  document.querySelectorAll('.settings-tabs .cat-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.stab === tab);
  });
  const panel = document.getElementById('settings-panel');
  if (panel) panel.innerHTML = '<div style="color:var(--muted);padding:16px">Загрузка...</div>';
  const html = await _renderSettingsPanel(isAdmin);
  if (panel) {
    panel.innerHTML = html;
    if (_settingsTab === 'employees') _empRefreshTables();
  }

async function _renderSettingsPanel(isAdmin) {
  if (_settingsTab === 'types')     return await _renderTypesPanel();
  if (_settingsTab === 'users')     return await _renderUsersPanel();
  if (_settingsTab === 'employees') return await _renderEmployeesPanel();
  if (_settingsTab === 'orgs')      return _renderOrgsPanel();
  if (_settingsTab === 'filials')   return _renderFilialsPanel();
  if (_settingsTab === 'locations') return _renderLocationsPanel();
  if (_settingsTab === 'config')    return _renderConfigPanel(isAdmin);
  const _gs = await fetch(`${API}/api/settings`).then(r=>r.json()).catch(()=>({}));
  const html = _renderGeneralPanel(isAdmin, _gs.company_name || _companyName, _gs.logo_svg || '', _appVersion);
  setTimeout(() => {
    _loadLogoPreview(_gs.logo_svg || '');
    if (isAdmin) _initStyleEditor();
  }, 50);
  return html;
}

function _lqTargetChange(liqId) {
  const val = document.getElementById('lq-target').value;
  document.getElementById('lq-new-fields').style.display = val === '__new__' ? '' : 'none';
}
async function doLiquidateOrg(id) {
  const targetVal = document.getElementById('lq-target').value;
  if (!targetVal) return toast('Выберите организацию','error');

  let targetOrgId = targetVal;

  if (targetVal === '__new__') {
    // Создаём новую орг на сервере, потом переносим
    const newName = document.getElementById('lq-new-name').value.trim();
    const newCode = document.getElementById('lq-new-code').value.trim().toUpperCase();
    if (!newName) return toast('Введите название новой организации','error');
    if (!newCode || newCode.length < 2) return toast('Введите код (минимум 2 символа)','error');

    // Create org with inherited rules
    const liqOrg = _orgsCache.find(o => o.id === id);
    const inheritedRules = (liqOrg?.inv_rules || []).map(r => ({...r, counter: 0}));
    const cr = await fetch(`${API}/api/orgs`, { method:'POST', headers:ah(),
      body:JSON.stringify({ name:newName, short_code:newCode, inv_rules:inheritedRules }) });
    const cd = await cr.json();
    if (!cr.ok) return toast(cd.error||'Ошибка создания организации','error');
    targetOrgId = cd.id;
    // Refresh cache so liquidate can find new org
    _orgsCache = await fetch(`${API}/api/orgs`).then(r=>r.json()).catch(()=>_orgsCache);
  }

  const r = await fetch(`${API}/api/orgs/${id}/liquidate`, {
    method:'POST', headers:ah(),
    body:JSON.stringify({ targetOrgId, renumberInv: targetVal === '__new__' })
  });
  const d = await r.json();
  if (r.ok) {
    closeModal();
    toast(`Переведено ассетов: ${d.transferred}${d.renumbered ? ', перенумеровано: '+d.renumbered : ''}. Запись в истории создана.`,'success');
    _refDataLoaded = false;
    await renderSettings();
  } else toast(d.error||'Ошибка','error');
}

async function doRenameInvRule(orgId, typeCode) {
  const inp = document.getElementById(`ir-rename-${typeCode}`);
  if (!inp) return;
  const type_name = inp.value.trim();
  if (!type_name) return toast('Название не может быть пустым','error');
  const r = await fetch(`${API}/api/orgs/${orgId}/inv-rules/${typeCode}`, { method:'PUT', headers:ah(), body:JSON.stringify({ type_name }) });
  const d = await r.json();
  if (r.ok) { toast('Переименовано','success'); _orgsCache = await fetch(`${API}/api/orgs`).then(r=>r.json()); showInvRulesModal(orgId); }
  else toast(d.error||'Ошибка','error');
}
async function deleteInvRule(orgId, typeCode, counter) {
  const r = await fetch(`${API}/api/orgs/${orgId}/inv-rules/${typeCode}`, { method:'DELETE', headers:ah() });
  const d = await r.json();
  if (!r.ok) return toast(d.error||'Ошибка','error');
  if (d.ok) {
    toast('Правило удалено','success');
    _orgsCache = await fetch(`${API}/api/orgs`).then(r=>r.json());
    showInvRulesModal(orgId);
    return;
  }
  if (d.conflict) {
    showDeleteInvRuleConflict(orgId, typeCode, d);
  }
}
function showDeleteInvRuleConflict(orgId, typeCode, info) {
  const org = _orgsCache.find(o => o.id === orgId);
  const otherRules = (org.inv_rules||[]).filter(r => r.type_code !== typeCode && r.active !== false);
  const transferOptions = otherRules.map(r =>
    `<option value="${esc(r.type_code)}">${esc(r.type_code)} — ${esc(r.type_name)}</option>`
  ).join('');
  showModal(`<h2>🗑 Удаление правила ${esc(typeCode)}</h2>
    <p style="font-size:14px;margin-bottom:16px">
      <b>${info.count} ассет(ов)</b> имеют инв. номера с префиксом <code>${esc(info.prefix)}</code>.<br>

// ── Импорт config.json с разрешением конфликтов ───────────────────────────────
let _pendingImport = null; // { incoming, clean, conflicts }

async function startConfigImport() {
  const file = document.getElementById('cfg-import-file')?.files[0];
  if (!file) return toast('Выберите файл','error');
  const result = document.getElementById('cfg-import-result');
  result.innerHTML = '<div style="color:var(--muted);font-size:13px">🔍 Анализирую...</div>';

  let incoming;
  try { incoming = JSON.parse(await file.text()); }
  catch(e) { result.innerHTML = `<div style="color:var(--danger-text)">❌ Невалидный JSON: ${e.message}</div>`; return; }

  const r = await fetch(`${API}/api/config/import/diff`, {
    method:'POST', headers:ah(), body:JSON.stringify({ config: incoming })
  });
  const d = await r.json();
  if (!r.ok) { result.innerHTML = `<div style="color:var(--danger-text)">❌ ${d.error}</div>`; return; }

  _pendingImport = { incoming, clean: d.clean, conflicts: d.conflicts };
  _renderImportPreview(result, d);
}

function _renderImportPreview(container, { clean, conflicts }) {
  const cleanCount = Object.values(clean).flat().length;
  const conflictCount = conflicts.length;

  const conflictsHtml = conflicts.map((c, idx) => {
    const typeLabel = { same_id_diff_data:'⚠️ Одинаковый ID, разные данные', same_code:'🔤 Совпадает код', same_name:'📝 Совпадает название' }[c.type] || c.type;
    const optionsBtns = c.options.map(opt => {
      const labels = { skip:'Пропустить', keep_current:'Оставить текущую', replace:'Заменить текущую', rename:'Переименовать и добавить' };
      const styles = { skip:'btn-secondary', keep_current:'btn-secondary', replace:'btn-danger', rename:'btn-primary' };
      return `<button class="btn btn-sm ${styles[opt]||'btn-secondary'}" onclick="_selectResolution(${idx},'${opt}')"
        id="res-btn-${idx}-${opt}">${labels[opt]||opt}</button>`;
    }).join('');

    const renameInput = c.options.includes('rename')
      ? `<div id="res-rename-${idx}" style="display:none;margin-top:6px">
          <input id="res-newname-${idx}" placeholder="Новое уникальное название" style="width:100%;font-size:13px"/>
         </div>`
      : '';

    return `<div class="alert-card" id="conflict-${idx}" style="flex-direction:column;align-items:stretch;margin-bottom:8px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <span style="font-size:11px;background:var(--surface2);border-radius:4px;padding:2px 6px;color:var(--muted)">${c.level}</span>
        <span style="font-size:12px;color:var(--warn-text);font-weight:600">${typeLabel}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;font-size:12px">
        <div style="background:var(--warn-bg);border-radius:6px;padding:8px;color:var(--warn-text)">
          <div style="color:var(--muted);margin-bottom:3px">Импортируемая</div>
          <b>${esc(c.incoming.name)}</b>${c.incoming.short_code ? ` <code>${esc(c.incoming.short_code)}</code>` : ''}
        </div>
        <div style="background:var(--success-bg);border-radius:6px;padding:8px;color:var(--success-text)">
          <div style="color:var(--muted);margin-bottom:3px">Текущая</div>
          <b>${esc(c.current?.name||'—')}</b>${c.current?.short_code ? ` <code>${esc(c.current.short_code)}</code>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="res-btns-${idx}">${optionsBtns}</div>
      ${renameInput}
    </div>`;
  }).join('');

  container.innerHTML = `
    <div style="background:var(--success-bg);border:1px solid var(--success-border);border-radius:8px;padding:11px;margin-bottom:12px;font-size:13px;color:var(--success-text)">
      ✅ Чистых записей: <b>${cleanCount}</b> &nbsp;|&nbsp; ⚠️ Конфликтов: <b>${conflictCount}</b>
    </div>
    ${conflictCount ? `<div style="font-size:13px;font-weight:600;margin-bottom:8px">Разрешите конфликты:</div>${conflictsHtml}` : ''}
    <div id="import-apply-wrap" style="margin-top:12px">
      <button class="btn btn-primary" onclick="applyConfigImport()" ${conflictCount ? 'disabled id="apply-config-btn"' : ''}>
        ✅ Применить импорт
      </button>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">
        ${conflictCount ? 'Разрешите все конфликты чтобы применить' : 'Нет конфликтов — можно применить сразу'}
      </div>
    </div>`;

  if (!conflictCount) return; // нет конфликтов — кнопка уже активна
  // Инициализируем счётчик неразрешённых
  window._unresolvedConflicts = new Set(conflicts.map((_, i) => i));
  window._resolutions = {};
}

function _selectResolution(idx, action) {
  // Подсветить выбранную кнопку
  document.querySelectorAll(`#res-btns-${idx} .btn`).forEach(b => b.style.outline = '');
  const btn = document.getElementById(`res-btn-${idx}-${action}`);
  if (btn) btn.style.outline = '2px solid var(--indigo)';

  // Показать поле ввода для rename
  const renameDiv = document.getElementById(`res-rename-${idx}`);
  if (renameDiv) renameDiv.style.display = action === 'rename' ? 'block' : 'none';

  if (action !== 'rename') {
    window._resolutions[idx] = { action };
    window._unresolvedConflicts.delete(idx);
    _checkAllResolved();
  } else {
    // rename — ждём ввода
    const inp = document.getElementById(`res-newname-${idx}`);
    if (inp) {
      inp.oninput = () => {
        if (inp.value.trim()) {
          window._resolutions[idx] = { action: 'rename', new_name: inp.value.trim() };
          window._unresolvedConflicts.delete(idx);
        } else {
          delete window._resolutions[idx];
          window._unresolvedConflicts.add(idx);
        }
        _checkAllResolved();
      };
    }
  }
}

function _checkAllResolved() {
  const applyBtn = document.getElementById('apply-config-btn');
  if (!applyBtn) return;
  applyBtn.disabled = window._unresolvedConflicts.size > 0;
  if (window._unresolvedConflicts.size === 0) {
    applyBtn.textContent = '✅ Все конфликты разрешены — Применить';
  }
}

async function applyConfigImport() {
  if (!_pendingImport) return toast('Нет данных для импорта','error');
  const { incoming, clean } = _pendingImport;
  const conflicts = _pendingImport.conflicts || [];

  const resolutions = conflicts.map((c, idx) => {
    const res = (window._resolutions||{})[idx];
    if (!res) return null;
    return { level: c.level, incoming_id: c.incoming.id, action: res.action, new_name: res.new_name };
  }).filter(Boolean);

  const r = await fetch(`${API}/api/config/import/apply`, {
    method:'POST', headers:ah(),
    body:JSON.stringify({ clean, resolutions, incoming, changedBy: currentUser?.name || 'admin' })
  });
  const d = await r.json();
  if (r.ok) {
    const result = document.getElementById('cfg-import-result');
    result.innerHTML = `<div style="background:var(--success-bg);border:1px solid var(--success-border);border-radius:8px;padding:14px;font-size:13px;color:var(--success-text)">
      ✅ <b>Импорт применён</b><br>
      Добавлено: ${d.added.length} · Обновлено: ${d.updated.length} · Пропущено: ${d.skipped.length}
    </div>`;
    toast('Конфиг импортирован','success');
    _pendingImport = null;
    try {
      const upd = await fetch(`${API}/api/settings`).then(r=>r.json());
      _companyName = upd.company_name || 'IT ASSETS';
      _updateLogoEl(_companyName, upd.logo_svg || '');
    } catch(e) {}
    await renderSettings();
  } else {
    toast(d.error||'Ошибка при применении','error');
  }
}

function _updateLogoEl(name, logoData) {
  const parts     = (name || 'IT ASSETS').trim().split(/\s+/);
  const logo      = document.getElementById('company-logo');
  const logoSvg   = document.getElementById('company-logo-svg');
  const logoEmoji = document.getElementById('company-logo-emoji');
  if (logo) {
    if (parts.length === 1) {
      const a = esc(parts[0].slice(0, 2));
      const b = esc(parts[0].slice(2));
      logo.innerHTML = a + (b ? `<span>${b}</span>` : '');
    } else {
      logo.innerHTML = esc(parts[0]) + `<span>${esc(parts.slice(1).join(' '))}</span>`;
    }
  }
  document.title = name;
  if (logoSvg && logoEmoji) {
    const isSvg    = logoData && logoData.trim().toLowerCase().startsWith('<svg');
    const isImgUrl = logoData && (logoData.startsWith('data:image') || logoData.startsWith('http'));
    if (isSvg) {
      logoSvg.innerHTML = logoData;
      const el = logoSvg.querySelector('svg');
      if (el) { el.style.height='36px'; el.style.width='auto'; el.removeAttribute('width'); el.removeAttribute('height'); }
      logoSvg.style.display = 'block';
      logoEmoji.style.display = 'none';
    } else if (isImgUrl) {
      logoSvg.innerHTML = `<img src="${logoData}" style="height:36px;width:auto;object-fit:contain" alt="logo"/>`;
      logoSvg.style.display = 'block';
      logoEmoji.style.display = 'none';
    } else {
      logoSvg.innerHTML = '';
      logoSvg.style.display = 'none';
      logoEmoji.style.display = 'block';
    }
  }
}

  if (!confirm('Сбросить стиль к стандартному?')) return;

  // Сбрасываем все кастомные CSS переменные
  const vars = ['--accent','--header-bg','--accent-dark','--header-bg-dark'];
  vars.forEach(v => document.documentElement.style.removeProperty(v));
  // Сбрасываем значения color-picker инпутов
  const defaults = { 'st-accent-light':'#e94560', 'st-accent-dark':'#e94560',
                     'st-header-light':'', 'st-header-dark':'' };
  Object.entries(defaults).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val;
  });
  fetch(`${API}/api/settings/styles`, { method:'PUT', headers:ah(), body:JSON.stringify({styles:{}}) });
  toast('Стиль сброшен', 'success');
  setTimeout(() => { _initStyleEditor(); _livePreview(); }, 50);
}

  const preview = document.getElementById('logo-preview');
  if (!preview) return;
  if (!logoData || !logoData.trim()) {
    preview.innerHTML = '<span style="font-size:12px;color:var(--muted)">Логотип не установлен</span>';
    return;
  }
  if (logoData.trim().toLowerCase().startsWith('<svg')) {
    // SVG разметка
    preview.innerHTML = logoData;
    const el = preview.querySelector('svg');
    if (el) { el.style.height='36px'; el.style.width='auto'; el.removeAttribute('width'); el.removeAttribute('height'); }
  } else if (logoData.startsWith('data:') || logoData.startsWith('http')) {
    // base64 или URL
    preview.innerHTML = `<img src="${logoData}" style="height:36px;width:auto;object-fit:contain" alt="logo"/>`;
  } else {
    preview.innerHTML = '<span style="font-size:12px;color:var(--muted)">Логотип не установлен</span>';
  }
}

async function saveLogoSvg() {
  const file = document.getElementById('logo-svg-file')?.files[0];
  if (!file) return toast('Выберите файл логотипа', 'error');

  let logoData;
  if (file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg')) {
    // SVG — читаем как текст
    logoData = await file.text();
    if (!logoData.trim().toLowerCase().includes('<svg'))
      return toast('Файл не является корректным SVG', 'error');
  } else {
    // PNG/JPG/WebP — конвертируем в base64 data URL
    logoData = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.onerror = () => rej(new Error('Ошибка чтения файла'));
      reader.readAsDataURL(file);
    });
  }

  // Проверяем размер (макс 512 KB)
  if (logoData.length > 512 * 1024) return toast('Файл слишком большой (макс. 512 KB)', 'error');

  const r = await fetch(`${API}/api/settings/logo_svg`, {
    method:'PUT', headers:ah(), body:JSON.stringify({ svg: logoData })
  });
  if (r.ok) {
    toast('Логотип сохранён', 'success');
    _updateLogoEl(_companyName || 'IT ASSETS', logoData);
    _loadLogoPreview(logoData);
  } else { const d = await r.json(); toast(d.error||'Ошибка','error'); }
}

let _importType = null; // 'assets' | 'history'
function detectImportType(input) {
  _importType = null;
  document.getElementById('import-btn').disabled = true;
  document.getElementById('import-type-hint').style.display = 'none';
  document.getElementById('import-result').innerHTML = '';
  document.getElementById('import-progress').style.display = 'none';
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const first = e.target.result.replace(/^\uFEFF/, '').split('\n')[0] || '';
    const headers = first.toLowerCase();
    const hint = document.getElementById('import-type-hint');
    hint.style.display = 'block';
    if (headers.includes('от кого') || headers.includes('from_who') || headers.includes('тип события')) {
      _importType = 'history';
      hint.innerHTML = '📥 <b>История перемещений</b> — будет загружена в журнал событий';
      hint.style.color = '#6366f1';
    } else if (headers.includes('модель') || headers.includes('model') || headers.includes('вкладка') || headers.includes('тип')) {
      _importType = 'assets';
      hint.innerHTML = '💻 <b>Оборудование</b> — будет загружено в реестр';
      hint.style.color = '#059669';
    } else {
      hint.innerHTML = '⚠️ Не удалось определить тип файла. Ожидается CSV с заголовками';
      hint.style.color = '#dc2626';
      return;
    }
    document.getElementById('import-btn').disabled = false;
  };
  reader.readAsText(file.slice(0, 2048), 'utf-8');
}

async function importAuto() {
  if (_importType === 'history') await importHistory();
  else if (_importType === 'assets') await importCSV();
  else toast('Выберите файл', 'error');
}

async function importCSV() {
  const file=document.getElementById('csv-file').files[0];
  if (!file) return toast('Выберите файл','error');
  const setProgress=(pct,label)=>{
    document.getElementById('import-progress').style.display='block';
    document.getElementById('import-progress-bar').style.width=pct+'%';
    document.getElementById('import-progress-label').textContent=label;
  };
  const btn=document.getElementById('import-btn');
  btn.disabled=true;
  document.getElementById('import-result').innerHTML='';
  setProgress(5,'Читаю файл...');
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
  if (lines.length<2){btn.disabled=false;document.getElementById('import-progress').style.display='none';return toast('Файл пустой','error');}
  setProgress(20,'Разбираю строки...');
  const sep=lines[0].includes(';')?';':',';
  function parseRow(line){const res=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===sep&&!inQ){res.push(cur);cur='';}else cur+=c;}
    res.push(cur);return res;}
  const headers=parseRow(lines[0]).map(h=>h.trim().toLowerCase());
  const MAP={'инв. номер':'inv','вкладка':'tab','tab':'tab','коллекция':'category','category':'category',
    'филиал':'filial','расположение':'location','ответственный':'responsible',
    'тип':'type','модель':'model','серийный №':'serial','статус':'status',
    'организация':'org','примечание':'note','ip':'ip','mac':'mac',
    'подсеть':'subnet','winbox/url':'winbox','логин':'login','пароль':'password',
    'hostname':'hostname','картриджи':'cartridge','прошивка':'firmware','инв шкаф':'cabinet'};
  // ── Загружаем маппинг тип→коллекция с сервера ────────────────────────────────
  let _typeTabMap = {};
  let _typeNormMap = {};
  try {
    const codes = await fetch(`${API}/api/type-codes`).then(r=>r.json());
    codes.forEach(t => {
      const key = t.name.trim().toLowerCase();
      _typeTabMap[key]  = t.tab  || 'os';
      _typeNormMap[key] = t.name.trim();
    });
  } catch(e) {}

  // Фоллбек если сервер не ответил или тип не в справочнике
  const INFRA_FALLBACK = new Set([
    'коммутатор','маршрутизатор','точка доступа','радиомост',
    'видеорегистратор','камера','ибп','сервер','poe hub','poe-hub','poe инжектор',
    'роутер','свитч','вызывная панель','видеодомофон','dvr','nvr','ups',
    'точка_доступа','wifi роутер','межсетевой экран','firewall','nas','san',
  ]);
  const SMALL_FALLBACK = new Set([
    'мышь','компьютерная мышь','комп мышь','клавиатура','клавиатура+мышь',
    'гарнитура','наушники','колонки','спикерфон',
    'web камера','веб.камера','веб камера','вебкамера',
    'usb-hub','usb hub','usb адаптер','usb wifi adapter',
    'патч-корд','патчкорд','кабель hdmi','кабель',
    'сетевой фильтр','удлинитель',
    'адаптер','адаптер dvi','адаптер dvi-d - hdmi','адаптер dvi-d',
    'ssd','hdd','жёсткий диск','жестский диск','жесткий диск','ssd/hdd',
    'смартфон','телефон','планшет',
    'кронштейн','кронштейн для 1 мон','кронштейн для 2x мон',
    'стилус','сумка','чехол','защитное стекло',
    'я. станция','яндекс станция','яндекс.станция',
    'тсд','сканер',
  ]);

  // Нормализация написания — приводим к каноническому из справочника
  const NORM_OVERRIDE = {
    'комп мышь':'Компьютерная мышь',
    'web камера':'Web камера','веб.камера':'Web камера','веб камера':'Web камера',
    'точка доступа':'Точка доступа','коммутатор':'Коммутатор','свитч':'Коммутатор',
    'маршрутизатор':'Маршрутизатор','роутер':'Маршрутизатор',
    'сервер':'Сервер','ибп':'ИБП','ups':'ИБП',
    'радиомост':'Радиомост','патч-корд':'Патч-корд','патчкорд':'Патч-корд',
    'ноутбук':'Ноутбук','системный блок':'Системный блок',
    'монитор':'Монитор','мфу':'МФУ','телевизор':'Телевизор',
    'смартфон':'Смартфон','планшет':'Планшет','мини пк':'Мини ПК',
    'жёсткий диск':'SSD/HDD','жестский диск':'SSD/HDD','жесткий диск':'SSD/HDD','ssd':'SSD/HDD',
    'видеорегистратор':'Видеорегистратор',
    'poe hub':'PoE инжектор','poe-hub':'PoE инжектор',
    'usb-hub':'USB-hub','usb hub':'USB-hub',
    'usb адаптер':'USB-hub','usb wifi adapter':'USB-hub',
    'адаптер dvi-d - hdmi':'Адаптер','адаптер dvi-d':'Адаптер','адаптер dvi':'Адаптер',
    'кронштейн для 1 мон':'Кронштейн','кронштейн для 2x мон':'Кронштейн',
    'я. станция':'Колонки','яндекс станция':'Колонки',
    'клавиатура+мышь':'Клавиатура',
    'кабель hdmi':'Патч-корд',
  };

  function _autoTab(row) {
    const typeKey = (row.type||'').trim().toLowerCase();
    // 1. Смотрим в справочник с сервера (точное совпадение)
    if (_typeTabMap[typeKey]) return _typeTabMap[typeKey];
    // 2. Фоллбек-списки
    if (INFRA_FALLBACK.has(typeKey)) return 'infra';
    if (SMALL_FALLBACK.has(typeKey)) return 'small';
    // 3. Явная колонка Вкладка
    const explicit = (row.tab||'').trim().toLowerCase();
    if (['os','small','infra'].includes(explicit)) return explicit;
    return 'os';
  }

  function _normType(type) {
    const key = type.trim().toLowerCase();
    // Сначала нормализация из справочника, затем override
    return _typeNormMap[key] || NORM_OVERRIDE[key] || type.trim();
  }

  const rows=lines.slice(1).map(l=>{
    const vals=parseRow(l);const row={};
    headers.forEach((h,i)=>{const k=MAP[h];if(k)row[k]=vals[i]||'';});
    if (!row.model) return null;
    row._origType = row.type || '';
    row.tab  = _autoTab(row);
    row.type = _normType(row.type || '');
    return row;}).filter(Boolean);
  if (!rows.length){btn.disabled=false;document.getElementById('import-progress').style.display='none';return toast('Нет данных','error');}
  // Сводка по коллекциям
  const tabCount = rows.reduce((a,r)=>{a[r.tab]=(a[r.tab]||0)+1;return a;},{});
  const TAB_NAMES = {os:'💻 ОС',small:'🖱 Мелочи',infra:'🌐 Инфра'};
  const tabSummary = Object.entries(tabCount).map(([t,n])=>`${TAB_NAMES[t]||t}: <b>${n}</b>`).join(' &nbsp;·&nbsp; ');

  // Ищем типы не найденные в справочнике — предупреждение
  const unknownTypes = {};
  rows.forEach(r => {
    const key = (r._origType||r.type||'').trim().toLowerCase();
    if (!_typeTabMap[key] && !INFRA_FALLBACK.has(key) && !SMALL_FALLBACK.has(key) && r.tab === 'os') {
      unknownTypes[r._origType||r.type] = (unknownTypes[r._origType||r.type]||0)+1;
    }
  });
  const unknownList = Object.entries(unknownTypes).sort((a,b)=>b[1]-a[1]);

  const resultEl = document.getElementById('import-result');
  if (unknownList.length) {
    resultEl.innerHTML = `<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:8px">
      ⚠️ <b>${unknownList.length} типов не найдено в справочнике</b> — попали в ОС по умолчанию.
      Добавьте их в <b>Настройки → Типы устройств</b>:<br>
      <span style="color:var(--warn-text)">${unknownList.map(([t,n])=>`${t} (${n})`).join(', ')}</span>
    </div>`;
  }

  setProgress(40,`Найдено ${rows.length} записей — ${tabSummary}...`);
  // animate bar from 40 to 85 while waiting for server
  let animPct=40;
  const anim=setInterval(()=>{
    if(animPct<85){animPct+=0.5;document.getElementById('import-progress-bar').style.width=animPct+'%';}
  },80);
  const r=await fetch(`${API}/api/import/csv`,{method:'POST',headers:ah(),body:JSON.stringify({rows})});
  clearInterval(anim);
  const d=await r.json();
  btn.disabled=false;
  if (r.ok){
    setProgress(100,`Готово: добавлено ${d.added}, пропущено ${d.skipped}`);
    document.getElementById('import-progress-bar').style.background='linear-gradient(90deg,#10b981,#059669)';
    const sr = d.skipReasons || {};
    const skipDetail = d.skipped > 0 ? [
      sr.dupe_serial > 0 ? `дублей по серийному: ${sr.dupe_serial}` : '',
      sr.dupe_key    > 0 ? `дублей без серийного: ${sr.dupe_key}` : '',
      sr.no_model    > 0 ? `без модели: ${sr.no_model}` : '',
    ].filter(Boolean).join(', ') : '';
    const skipHtml = d.skipped > 0
      ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">Пропущено ${d.skipped}: ${skipDetail}</div>`
      : '';
    const invHtml = d.inv_assigned > 0
      ? `<div style="font-size:11px;color:#059669;margin-top:4px">🏷 Авто-присвоено инв. номеров: ${d.inv_assigned}</div>`
      : '';
    const orgsHtml = d.created_orgs && d.created_orgs.length
      ? `<div style="font-size:11px;color:var(--info-text);margin-top:4px">🏢 Создано организаций: ${d.created_orgs.length} — ${d.created_orgs.join(', ')}</div>`
      : '';
    document.getElementById('import-result').innerHTML=`
      <div style="display:flex;align-items:center;gap:6px;color:#065f46;font-weight:600">
        ✅ Добавлено: ${d.added}
      </div>${invHtml}${orgsHtml}${skipHtml}`;
    toast('Импортировано '+d.added,'success');
    setTimeout(()=>{ if(currentTab==='dashboard') renderDashboard(); },800);
  } else {
    setProgress(100,'Ошибка импорта');
    document.getElementById('import-progress-bar').style.background='#ef4444';
    toast(d.error||'Ошибка','error');
  }
}

function metaFormRows(category, existing={}) {

function collectMeta(category) {
  const fields=getMetaFields(category);
  const meta={};
  fields.forEach(k=>{const el=document.getElementById('meta-'+k);if(el)meta[k]=el.value;});

// ── Справочники в формах ─────────────────────────────────────────────────────

function _buildOrgOpts(selected) {
  const opts = _orgsCache.map(o =>
    `<option value="${esc(o.name)}" ${o.name===selected?'selected':''}>${esc(o.name)}</option>`
  );
  if (!_orgsCache.some(o=>o.name===selected) && selected)
    opts.unshift(`<option value="${esc(selected)}" selected>${esc(selected)}</option>`);
  return opts.join('');
}

function _buildLocOpts(filialId, selected='') {
  const locs = filialId
    ? _locsCache.filter(l => l.filial_id === filialId && l.status === 'active')
    : _locsCache.filter(l => l.status === 'active');
  // Always include current value even if not in filtered list
  const hasSelected = locs.some(l=>l.name===selected);
  let opts = locs.map(l =>
    `<option value="${esc(l.name)}" ${l.name===selected?'selected':''}>${esc(l.name)}</option>`
  ).join('');
  if (!hasSelected && selected)
    opts = `<option value="${esc(selected)}" selected>${esc(selected)}</option>` + opts;
  if (!opts) opts = `<option value="">— нет локаций —</option>`;
  return opts;
}

function _updateLocSelect(filialName, selectId) {
  const filialObj = _filialsCache.find(f=>f.name===filialName);
  const sel = document.getElementById(selectId);
  if (sel) sel.innerHTML = _buildLocOpts(filialObj?.id||'');
}
